# =============================================================================
# Origo Universal Chart — values.yaml
# =============================================================================
# This file defines the default configuration for the universal-chart.
# Every top-level key maps to one or more Kubernetes resource templates.
#
# Convention: resource keys are maps — each sub-key becomes the resource name.
#   deployments:
#     api:          ← creates Deployment named "<releasePrefix>-api"
#       image: myapp:1.0
#
# Set `disabled: true` on any instance to suppress it without deleting config.
# =============================================================================

# =============================================================================
# @section Global Settings
# =============================================================================

# -- Prefix prepended to all resource names. Leave empty to disable.
releasePrefix: ""

# -- Fallback image pull policy. One of: `Always`, `IfNotPresent`, `Never`.
defaultImagePullPolicy: "IfNotPresent"

# -- Image pull secret names referenced in every pod spec. Secrets must be pre-created in the namespace.
# @default -- `[]`
imagePullSecrets: []

# Override the chart name used in resource name generation (uncomment to use).
# nameOverride: ""

# -- Diagnostic mode — overrides command/args on main containers only (init containers are not affected). Useful for debugging crash-looping pods.
diagnosticMode:
  # -- Enable diagnostic mode globally.
  enabled: false
  # -- Command override applied to every container.
  command: ["sleep"]
  # -- Args override applied to every container.
  args: ["infinity"]

# =============================================================================
# @section Default Settings
# =============================================================================

# -- Default settings applied to all workload templates (labels, annotations, pod metadata, volumes, etc.)
defaults:
  # -- Labels added to every resource's `metadata.labels`.
  labels: {}
  # -- Annotations added to every resource's `metadata.annotations`.
  annotations: {}
  # -- Annotations applied to hook Job resources only. Does NOT propagate to ConfigMaps or Secrets.
  hookAnnotations: {}
  #   helm.sh/hook: "pre-install,pre-upgrade"
  #   helm.sh/hook-weight: "-999"
  #   helm.sh/hook-delete-policy: before-hook-creation
  # -- Extra selector labels merged into workload `matchLabels`.
  extraSelectorLabels: {}
  # -- Labels added to pod templates.
  podLabels: {}
  # -- Annotations added to pod templates.
  podAnnotations: {}
  #   checksum/envs: '{{ include "helpers.workload.checksum" (printf "%s%s" $.Values.envs $.Values.envsString) }}'
  # -- Additional volumes appended to every workload's pod spec.
  extraVolumes: []
  # -- Additional volume mounts appended to every container.
  extraVolumeMounts: []
  # -- Additional image pull secrets appended to every pod spec.
  extraImagePullSecrets: []
  # -- Use the chart's built-in pod affinity/anti-affinity rules.
  usePredefinedAffinity: true
  # -- Automatically inject `checksum/...` pod annotations for chart-managed ConfigMaps
  # and Secrets referenced by the workload via `envConfigmaps` / `envSecrets`.
  # When the underlying data changes the annotation hash changes, triggering a
  # rolling restart. Set to `false` to disable globally; override per-kind via
  # `*General.autoChecksum` or per-instance via `<workload>.autoChecksum`.
  # @default -- `true`
  # autoChecksum: true
  # -- Default ServiceAccount name assigned to pods when not overridden per-workload.
  # serviceAccountName: ""
  # -- Default hostAliases injected into every pod spec.
  # hostAliases: []
  # -- Default PriorityClass name for pods.
  # priorityClassName: ""
  # -- Default DNS policy for pods. One of: `ClusterFirst`, `Default`, `ClusterFirstWithHostNet`, `None`.
  # dnsPolicy: ""
  # -- Default pod DNS configuration applied to every pod spec.
  # dnsConfig:
  #   options:
  #     - name: ndots
  #       value: "2"
  # -- Default nodeSelector applied to every pod spec.
  # nodeSelector: {}
  # -- Default tolerations applied to every pod spec.
  # tolerations: []
  # -- Default volumes (typed format) added to every pod spec (see `_volumes.tpl`).
  # volumes: []
  #   - name: app-config
  #     type: configMap
  #     configMapName: my-configmap
  #   - name: app-secret
  #     type: secret
  #     secretName: my-secret
  #   - name: app-data
  #     type: pvc
  #     claimName: my-pvc
  # -- Default resource requests/limits. **No default resources are shipped with the chart** —
# CPU and memory requests/limits must be set explicitly per workload or via `defaults`,
# `<kind>General`, or the workload instance. Uncomment and customize to set shared defaults:
# resources:
#   requests:
#     cpu: 100m
#     memory: 128Mi
#   limits:
#     memory: 512Mi
  # -- Default pod-level securityContext applied to every pod spec.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # -- Default container-level securityContext applied to every container.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # -- Default topologySpreadConstraints applied to every pod spec.
  # topologySpreadConstraints: []
  #   - maxSkew: 1
  #     topologyKey: kubernetes.io/hostname
  #     whenUnsatisfiable: ScheduleAnyway
  #     labelSelector:
  #       matchLabels: {}
  # -- Default terminationGracePeriodSeconds for all pods. Omit to use Kubernetes default (30s).
  # terminationGracePeriodSeconds: 60
  # -- Default revisionHistoryLimit for Deployments and StatefulSets. Controls how many old
  # ReplicaSets/ControllerRevisions are retained for rollback. Lower values reduce etcd/API-server
  # load; set to 0 to disable rollback history entirely.
  revisionHistoryLimit: 3
  # -- Default preStop sleep duration (seconds). When set, adds a `sleep N` preStop lifecycle hook
  # to every container that does not define an explicit `lifecycle` block. Useful for graceful
  # shutdown to allow in-flight requests to drain before SIGTERM.
  # preStopSleep: 5

# =============================================================================
# @section Pod Scheduling & Affinity
# =============================================================================

# -- Pod affinity preset. Allowed values: `soft`, `hard`, or empty string to disable.
podAffinityPreset: soft

# -- Pod anti-affinity preset. Allowed values: `soft`, `hard`, or empty string to disable.
podAntiAffinityPreset: soft

# -- Node affinity preset configuration.
nodeAffinityPreset:
  # -- Affinity type. Allowed values: `soft`, `hard`, or empty string to disable.
  type: ""
  # -- Node label key to match (e.g. `kubernetes.io/e2e-az-name`).
  key: ""
  # -- Node label values to match.
  values: []

# =============================================================================
# @section Environment Variables
# =============================================================================

# -- Non-secret environment variables injected via `envFrom` into ALL workloads automatically.
envs: {}
#   BAR: foo
#   TEST: "true"

# -- Non-secret environment variables as a raw YAML string (for multiline or special chars).
# Injected via `envFrom` into ALL workloads automatically.
# envsString: |
#   BAR2: foo2

# -- Secret environment variables injected via `envFrom` into ALL workloads automatically.
secretEnvs: {}
#   DB_PASSWORD: s3cret

# -- Secret environment variables as a raw YAML string.
# Injected via `envFrom` into ALL workloads automatically.
# secretEnvsString: |
#   API_KEY: abc123

# =============================================================================
# @section Workloads
# =============================================================================

# -- Shared defaults for all Deployments (merged with per-instance values).
deploymentsGeneral: {}
# -- Kubernetes Deployment resources. Each key becomes the resource name.
# @default -- `{}`
# Single-container shorthand: set `image:` at workload level instead of a `containers:` list.
# `ports:` (map form `{name: port}`) auto-creates containerPorts.
# Use list-form for multi-port definitions (e.g. different protocols).
# The full `containers:` list still works for multi-container workloads.
deployments: {}
#   # ── Single-container shorthand ──
#   api:
#     image: myapp:1.2.3
#     replicas: 2
#     ports:
#       http: 8080
#     service:
#       type: LoadBalancer
#       externalTrafficPolicy: Local
#       loadBalancerSourceRanges: [10.0.0.0/8]
#     resources:
#       requests: { cpu: 100m, memory: 128Mi }
#       limits: { memory: 256Mi }
#     healthCheck: { path: /healthz, port: 8080 }
#
#   # ── Multi-container (full API) ──
#   nginx:
#     replicas: 2
#     containers:
#       - name: nginx
#         image: nginx
#         imageTag: "1.25"

# -- Shared defaults for all StatefulSets.
statefulSetsGeneral: {}
# -- Kubernetes StatefulSet resources. Each key becomes the resource name.
# Uses `updateStrategy` instead of `strategy`. Adds `volumeClaimTemplates` support.
statefulSets: {}

# -- Shared defaults for all DaemonSets.
daemonSetsGeneral: {}
# -- Kubernetes DaemonSet resources. Each key becomes the resource name.
# DaemonSets run one pod per node (no `replicas`). Uses `updateStrategy` instead of `strategy`.
daemonSets: {}

# -- Shared defaults for all CronJobs.
cronJobsGeneral:
  usePredefinedAffinity: false
# -- Kubernetes CronJob resources. Each key becomes the resource name.
cronJobs: {}
#   generate-data:
#     schedule: "*/5 * * * *"
#     command:
#       - php
#       - yii
#       - crontab/generate-data

# -- Shared defaults for all Jobs.
jobsGeneral:
  usePredefinedAffinity: false
# -- Kubernetes Job resources (non-hook). Each key becomes the resource name.
jobs: {}

# -- Shared defaults for all hook Jobs.
hooksGeneral: {}
# -- Helm lifecycle hook Jobs (pre/post-install/upgrade). Each key becomes the hook name.
hooks: {}
#   migration-up:
#     containers:
#       - image: registry.app.ru/app-migration
#         args: [up]

# =============================================================================
# @section Networking
# =============================================================================

# -- Kubernetes Service resources. Each key becomes the resource name.
# If `workload` is omitted, the selector defaults to the service key name.
# Set `selector` to override the selector verbatim. ExternalName services omit selectors.
services: {}
#   nginx:
#     ports:
#       - name: http
#         port: 8080
#     # workload: nginx # optional; defaults to the service key name
#     # selector:
#     #   app.kubernetes.io/component: nginx

# -- Gateway API HTTPRoute resources. Each key becomes the resource name.
httpRoutes: {}
#   my-app:
#     spec:
#       parentRefs:
#         - name: istio-gateway
#           namespace: istio-ingress
#       hostnames: [app.example.com]
#       rules: []

# =============================================================================
# @section Storage
# =============================================================================

# -- Kubernetes ConfigMap resources. Each key becomes the resource name.
configMaps: {}
#   my-config:
#     data:
#       KEY: value

# -- Kubernetes Secret resources. Each key becomes the resource name.
secrets: {}
#   my-secret:
#     data:
#       api.key: supersecret
#     # keepOnDelete: true

# -- Kubernetes StorageClass resources (cluster-scoped, no namespace). Each key becomes the resource name.
# Standard StorageClass fields are passed through directly (no `spec:` wrapper — StorageClass has no spec in the K8s API).
# Set `isDefault: true` to add the `storageclass.kubernetes.io/is-default-class: "true"` annotation.
storageClasses: {}
#   fast-ssd:
#     provisioner: disk.csi.azure.com
#     reclaimPolicy: Retain                    # Delete (default) | Retain
#     volumeBindingMode: WaitForFirstConsumer  # Immediate | WaitForFirstConsumer
#     allowVolumeExpansion: true
#     parameters:
#       skuName: Premium_LRS
#       cachingMode: ReadOnly
#     mountOptions:
#       - debug
#     # isDefault: true                        # mark as cluster default

# -- Kubernetes PersistentVolume resources (cluster-scoped, no namespace). Each key becomes the resource name.
# Thin passthrough — `spec:` goes directly to the Kubernetes resource unchanged.
persistentVolumes: {}
#   azure-share:
#     spec:
#       capacity:
#         storage: 50Gi
#       accessModes:
#         - ReadWriteMany
#       azureFile:
#         secretName: azure-storage-secret
#         shareName: my-share
#         readOnly: false
#       persistentVolumeReclaimPolicy: Retain

# -- Kubernetes PersistentVolumeClaim resources. Each key becomes the resource name.
# PVCs are NOT automatically mounted — reference them manually via `volumes:` with `type: pvc` and `claimName:`.
pvcs: {}
#   app-data:
#     accessModes: [ReadWriteOnce]
#     size: 8Gi
#     # keepOnDelete: true

