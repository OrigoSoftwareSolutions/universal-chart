# =============================================================================
# @section Argo CD Image Updater
# =============================================================================

# -- Argo CD Image Updater resources. Each key becomes the resource name.
# Configures automatic image updates for Argo CD applications.
#
# The ImageUpdater CR is deployed into the `argocd` namespace by default,
# matching where Application CRs live and AIU v1.2+ namespace-scoped defaults.
# Override per resource via `metadataNamespace`.
#
# Why `manifestTargets` is required (no chart-level default):
# universal-chart hosts N deployments per release. AIU writes back a single
# Helm parameter; targeting a chart-root key would be ambiguous (which
# deployment? which container?) and would silently shadow per-deployment
# values. Each `images[]` entry MUST point `manifestTargets.helm.{name,tag}`
# at the exact value path the chart reads — typically
# `deployments.<name>.image` / `deployments.<name>.imageTag`.
imageUpdaters: {}
#   my-app:
#     applicationName: "my-argocd-app"
#     # metadataNamespace: argocd   # where the ImageUpdater CR is created
#     images:
#       - alias: api
#         imageName: registry.example.com/my-image
#         updateStrategy: newest-build
#         allowTags: 'regexp:^\d+\.\d+\.\d+-main-[a-z0-9]+-\d+$'
#         manifestTargets:
#           helm:
#             name: deployments.api.image
#             tag: deployments.api.imageTag
#     writeBackConfig:
#       method: argocd

