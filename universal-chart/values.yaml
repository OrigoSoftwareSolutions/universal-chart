# =============================================================================
# Origo Universal Chart — values.yaml
# =============================================================================
# This chart supports a single workload per release.  Every resource is a
# singular optional block — not a dict of instances.  For resources that are
# naturally multiple per release (certificates, Istio routes, etc.) the dict
# pattern is retained.
#
# Resource naming (singular blocks):
#   name: my-app           →  literal name "my-app"
#   name: "" (default)     →  .Release.Name
# =============================================================================

# =============================================================================
# @section Global Settings
# =============================================================================

# -- Fallback image pull policy. One of: `Always`, `IfNotPresent`, `Never`.
defaultImagePullPolicy: "IfNotPresent"

# -- Image pull secret names referenced in every pod spec. Secrets must be pre-created in the namespace.
# @default -- `[]`
imagePullSecrets: []

# Override the chart name used in resource name generation (uncomment to use).
# nameOverride: ""

# -- Diagnostic mode — overrides command/args on main containers only (init containers are not affected).
diagnosticMode:
  # -- Enable diagnostic mode globally.
  enabled: false
  # -- Command override applied to every container.
  command: ["sleep"]
  # -- Args override applied to every container.
  args: ["infinity"]

# =============================================================================
# @section Default Settings
# =============================================================================

# -- Default settings applied to all templates.  Labels, annotations, pod
# metadata, security contexts, resources, etc.  These are accessed directly
# (no merge cascade) — the workload block or resource block simply references
# defaults as needed.
defaults:
  # -- Labels added to every resource's `metadata.labels`.
  labels: {}
  # -- Annotations added to every resource's `metadata.annotations`.
  annotations: {}

  # -- Extra selector labels merged into workload `matchLabels`.
  extraSelectorLabels: {}
  # -- Labels added to pod templates.
  podLabels: {}
  # -- Annotations added to pod templates.
  podAnnotations: {}

  # -- Additional volumes appended to every workload's pod spec.
  extraVolumes: []
  # -- Additional volume mounts appended to every container.
  extraVolumeMounts: []
  # -- Additional image pull secrets appended to every pod spec.
  extraImagePullSecrets: []

  # -- Use the chart's built-in pod affinity/anti-affinity rules.
  usePredefinedAffinity: true

  # -- Default ServiceAccount name assigned to pods when not overridden per-workload.
  # serviceAccountName: ""
  # -- Default hostAliases injected into every pod spec.
  # hostAliases: []
  # -- Default PriorityClass name for pods.
  # priorityClassName: ""
  # -- Default DNS policy for pods.
  # dnsPolicy: ""
  # -- Default pod DNS configuration.
  # dnsConfig:
  #   options:
  #     - name: ndots
  #       value: "2"
  # -- Default nodeSelector applied to every pod spec.
  # nodeSelector: {}
  # -- Default tolerations applied to every pod spec.
  # tolerations: []
  # -- Default volumes (typed format) added to every pod spec.
  # volumes: []
  #   - name: app-config
  #     type: configMap
  #     configMapName: my-configmap
  # -- Default resource requests/limits.
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     memory: 512Mi
  # -- Default pod-level securityContext.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # -- Default container-level securityContext.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  # -- Default topologySpreadConstraints.
  # topologySpreadConstraints: []
  # -- Default terminationGracePeriodSeconds.
  # terminationGracePeriodSeconds: 60
  # -- Default revisionHistoryLimit for Deployments and StatefulSets.
  revisionHistoryLimit: 3
  # -- Default preStop sleep duration (seconds).
  # preStopSleep: 5

# =============================================================================
# @section Pod Scheduling & Affinity
# =============================================================================

# -- Pod affinity preset. Allowed values: `soft`, `hard`, or empty string to disable.
podAffinityPreset: soft

# -- Pod anti-affinity preset. Allowed values: `soft`, `hard`, or empty string to disable.
podAntiAffinityPreset: soft

# -- Node affinity preset configuration.
nodeAffinityPreset:
  # -- Affinity type. Allowed values: `soft`, `hard`, or empty string to disable.
  type: ""
  # -- Node label key to match (e.g. `kubernetes.io/e2e-az-name`).
  key: ""
  # -- Node label values to match.
  values: []

# =============================================================================
# @section Workloads
# =============================================================================

# -- Kubernetes Deployment.  Only one per release.
# @default -- `{}`
# Single-container shorthand: set `image:` at workload level instead of `containers:`.
# `ports:` (map form) auto-creates containerPorts.
# Use the full `containers:` list for multi-container workloads.
deployment: {}
#   name: my-app
#   enabled: true
#   image: myapp:1.2.3
#   imageTag: ""
#   replicas: 2
#   ports:
#     http: 8080
#   containers: []
#   initContainers: []
#   strategy: {}
#
#   # Pod-level fields
#   env: []
#   envFrom: []
#   envConfigmaps: []
#   envSecrets: []
#   volumes: []
#   volumeMounts: []
#   resources: {}
#   securityContext: {}
#   containerSecurityContext: {}
#   affinity: {}
#   nodeSelector: {}
#   tolerations: []
#   topologySpreadConstraints: []
#   labels: {}
#   annotations: {}
#   podLabels: {}
#   podAnnotations: {}
#   serviceAccountName: ""
#   extraSelectorLabels: {}
#   minReadySeconds:
#   progressDeadlineSeconds:
#   revisionHistoryLimit:

# -- Kubernetes StatefulSet.  Only one per release.
statefulset: {}
#   name: my-sts
#   serviceName: ""
#   updateStrategy: {}
#   podManagementPolicy: OrderedReady
#   volumeClaimTemplates: []
#   (all Deployment fields above apply)

# -- Kubernetes DaemonSet.  Only one per release.
daemonset: {}
#   name: my-ds
#   updateStrategy: {}
#   (all Deployment fields above apply, except replicas)

# -- Kubernetes Job (non-hook).  Only one per release.
job: {}
#   name: my-job
#   schedule: ""       # required for cronJob
#   restartPolicy: Never
#   parallelism:
#   completions:
#   backoffLimit:
#   activeDeadlineSeconds:
#   ttlSecondsAfterFinished:
#   commandDurationAlert:
#   (all container/pod level fields apply)

# -- Kubernetes CronJob.  Only one per release.
cronJob: {}
#   name: my-cron
#   schedule: "*/5 * * * *"
#   timeZone:
#   concurrencyPolicy:
#   suspend:
#   startingDeadlineSeconds:
#   successfulJobsHistoryLimit:
#   failedJobsHistoryLimit:
#   (all Job fields above apply)

