{{- if .Values.serviceAccount -}}
  {{- $general := $.Values.serviceAccountGeneral -}}
  {{- $serviceAccount := list -}}
  {{- if kindIs "string" .Values.serviceAccount -}}
{{- $serviceAccount = fromYaml .Values.serviceAccount -}}
  {{- else if kindIs "map" .Values.serviceAccount -}}
{{- $serviceAccount = .Values.serviceAccount -}}
  {{- end -}}
  {{- range $name, $val := $serviceAccount }}
    {{- if not (.disabled | default false) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
    {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
    {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
{{- if or $val.automountServiceAccountToken $general.automountServiceAccountToken }}
automountServiceAccountToken: {{ $val.automountServiceAccountToken | default $general.automountServiceAccountToken }}
{{- end }}
{{- if or $val.imagePullSecrets $general.imagePullSecrets }}
imagePullSecrets:
{{- with $val.imagePullSecrets }}
{{- toYaml . | nindent 2 }}
{{- else }}
{{- with $general.imagePullSecrets }}
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- if or $val.secrets $general.secrets }}
secrets:
{{- with $val.secrets }}
{{- toYaml . | nindent 2 }}
{{- else }}
{{- with $general.secrets }}
{{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
      {{- if .role }}
        {{- if .role.rules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
rules:
        {{- include "helpers.tplvalues.render" (dict "value" $val.role.rules "context" $) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "helpers.app.fullname" (dict "name" $val.role.name "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
      {{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.role.name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $val.role.name }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
      {{- end }}
    {{- end }}
{{- if or $val.clusterRole $general.clusterRole }}
  {{- if $val.clusterRole }}
    {{- if $val.clusterRole.rules }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.clusterRole.name "context" $) }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
rules:
        {{- include "helpers.tplvalues.render" (dict "value" $val.clusterRole.rules "context" $) | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.clusterRole.name "context" $) }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "helpers.app.fullname" (dict "name" $val.clusterRole.name "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
      {{- else }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $val.clusterRole.name "context" $) }}
  labels:
        {{- include "helpers.app.labels" $ | nindent 4 }}
        {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  annotations:
        {{- include "helpers.app.defaultAnnotations" $ | indent 4 }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $val.clusterRole.name }}
subjects:
- kind: ServiceAccount
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end -}}
{{- end }}
