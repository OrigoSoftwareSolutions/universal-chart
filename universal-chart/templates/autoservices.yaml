{{- /*
Auto-generate a ClusterIP Service for any workload that uses the single-container
shorthand and has a ports map defined. Skipped when:
- service: false  (user opts out)
- an explicit entry exists in .Values.services with the same name
- the workload is disabled
*/ -}}
{{- define "helpers.autoservice" -}}
{{- $ := .context -}}
  {{- $name := .name -}}
  {{- $val := .value -}}
  {{- $skipService := and (kindIs "bool" $val.service) (not $val.service) -}}
  {{- if and (kindIs "map" $val.ports) (not $skipService) (not ($val.disabled | default false)) (not (hasKey $.Values.services $name)) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- if kindIs "map" $val.service }}
      {{- with (index $val.service "labels") }}
        {{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
      {{- end }}
    {{- end }}
    {{- $svcAnnotations := dict }}
    {{- if kindIs "map" $val.service }}{{ $svcAnnotations = index $val.service "annotations" | default dict }}{{- end }}
    {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
    {{- if or $annots $svcAnnotations }}
  annotations:
      {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
      {{- with $svcAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- end }}
spec:
    {{- if kindIs "map" $val.service }}
  type: {{ index $val.service "type" | default "ClusterIP" }}
    {{- else }}
  type: ClusterIP
    {{- end }}
    {{- if kindIs "map" $val.service }}
      {{- with (index $val.service "clusterIP") }}
  clusterIP: {{ . }}
      {{- end }}
      {{- with (index $val.service "externalTrafficPolicy") }}
  externalTrafficPolicy: {{ . }}
      {{- end }}
      {{- with (index $val.service "loadBalancerSourceRanges") }}
  loadBalancerSourceRanges:
        {{- toYaml . | nindent 4 }}
      {{- end }}
      {{- with (index $val.service "loadBalancerIP") }}
  loadBalancerIP: {{ . }}
      {{- end }}
      {{- with (index $val.service "loadBalancerClass") }}
  loadBalancerClass: {{ . }}
      {{- end }}
      {{- if hasKey $val.service "allocateLoadBalancerNodePorts" }}
  allocateLoadBalancerNodePorts: {{ index $val.service "allocateLoadBalancerNodePorts" }}
      {{- end }}
      {{- with (index $val.service "sessionAffinity") }}
  sessionAffinity: {{ . }}
      {{- end }}
      {{- with (index $val.service "sessionAffinityConfig") }}
  sessionAffinityConfig:
        {{- toYaml . | nindent 4 }}
      {{- end }}
      {{- with (index $val.service "healthCheckNodePort") }}
  healthCheckNodePort: {{ . }}
      {{- end }}
      {{- with (index $val.service "externalIPs") }}
  externalIPs:
        {{- toYaml . | nindent 4 }}
      {{- end }}
      {{- if hasKey $val.service "publishNotReadyAddresses" }}
  publishNotReadyAddresses: {{ index $val.service "publishNotReadyAddresses" }}
      {{- end }}
      {{- with (index $val.service "ipFamilies") }}
  ipFamilies:
        {{- toYaml . | nindent 4 }}
      {{- end }}
      {{- with (index $val.service "ipFamilyPolicy") }}
  ipFamilyPolicy: {{ . }}
      {{- end }}
    {{- end }}
  ports:
    {{- range $portName := keys $val.ports | sortAlpha }}
      {{- $portVal := index $val.ports $portName }}
      {{- if kindIs "map" $portVal }}
  - name: {{ $portName }}
    port: {{ $portVal.port | int }}
    targetPort: {{ $portName }}
    protocol: {{ $portVal.protocol | default "TCP" }}
      {{- else }}
  - name: {{ $portName }}
    port: {{ $portVal | int }}
    targetPort: {{ $portName }}
    protocol: TCP
      {{- end }}
    {{- end }}
  selector:
    {{- include "helpers.app.workloadSelectorLabels" (dict "name" $name "context" $) | nindent 4 }}
  {{- end }}
{{- end }}

{{- range $name, $val := .Values.deployments }}
  {{- include "helpers.autoservice" (dict "name" $name "value" $val "context" $) }}
{{- end }}

{{- range $name, $val := .Values.statefulSets }}
  {{- include "helpers.autoservice" (dict "name" $name "value" $val "context" $) }}
{{- end }}

{{- range $name, $val := .Values.daemonSets }}
  {{- include "helpers.autoservice" (dict "name" $name "value" $val "context" $) }}
{{- end }}
