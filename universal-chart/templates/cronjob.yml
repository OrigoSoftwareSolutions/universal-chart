{{- if .Values.cronJobs -}}
  {{- $general := $.Values.cronJobsGeneral -}}
  {{- $cronJobs := list -}}
  {{- if kindIs "string" .Values.cronJobs -}}
{{- $cronJobs = fromYaml .Values.cronJobs -}}
  {{- else if kindIs "map" .Values.cronJobs -}}
{{- $cronJobs = .Values.cronJobs -}}
  {{- end -}}
  {{- range $name, $job := $cronJobs }}
    {{- if not (.disabled | default false) }}
      {{- $cjName := include "helpers.app.fullname" (dict "name" $name "context" $) }}
---
apiVersion: {{ include "helpers.capabilities.cronJob.apiVersion" $ }}
kind: CronJob
metadata:
  name: {{ $cjName }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
      {{- include "helpers.app.labels" $ | nindent 4 }}
      {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
      {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
      {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
      {{- if or $annots $general.annotations .annotations }}
  annotations:
        {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
        {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
        {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
      {{- end }}
spec:
  suspend: {{ default false .suspend }}
  schedule: {{ include "helpers.tplvalues.render" (dict "value" .schedule "context" $) | quote }}
      {{- if .singleOnly }}
  concurrencyPolicy: Forbid
      {{- end }}
      {{- if (ne .startingDeadlineSeconds nil) }}
  startingDeadlineSeconds: {{ .startingDeadlineSeconds }}
      {{- else if (ne $general.startingDeadlineSeconds nil) }}
  startingDeadlineSeconds: {{ $general.startingDeadlineSeconds }}
      {{- end }}
      {{- if (ne .successfulJobsHistoryLimit nil) }}
  successfulJobsHistoryLimit: {{ .successfulJobsHistoryLimit }}
      {{- else if (ne $general.successfulJobsHistoryLimit nil) }}
  successfulJobsHistoryLimit: {{ $general.successfulJobsHistoryLimit }}
      {{- end }}
      {{- if (ne .failedJobsHistoryLimit nil) }}
  failedJobsHistoryLimit: {{ .failedJobsHistoryLimit }}
      {{- else if (ne $general.failedJobsHistoryLimit nil) }}
  failedJobsHistoryLimit: {{ $general.failedJobsHistoryLimit }}
      {{- end }}
  jobTemplate:
    spec:
      {{- if (ne .parallelism nil) }}
      parallelism: {{ .parallelism }}
      {{- else if (ne $general.parallelism nil) }}
      parallelism: {{ $general.parallelism }}
      {{- end }}
      {{- if (ne .completions nil) }}
      completions: {{ .completions }}
      {{- else if (ne $general.completions nil) }}
      completions: {{ $general.completions }}
      {{- end }}
      {{- if (ne .activeDeadlineSeconds nil) }}
      activeDeadlineSeconds: {{ .activeDeadlineSeconds }}
      {{- else if (ne $general.activeDeadlineSeconds nil) }}
      activeDeadlineSeconds: {{ $general.activeDeadlineSeconds }}
      {{- end }}
      {{- if (ne .backoffLimit nil) }}
      backoffLimit: {{ .backoffLimit }}
      {{- else if (ne $general.backoffLimit nil) }}
      backoffLimit: {{ $general.backoffLimit }}
      {{- end }}
      {{- if (ne .ttlSecondsAfterFinished nil) }}
      ttlSecondsAfterFinished: {{ .ttlSecondsAfterFinished }}
      {{- else if (ne $general.ttlSecondsAfterFinished nil) }}
      ttlSecondsAfterFinished: {{ $general.ttlSecondsAfterFinished }}
      {{- end }}
      template:
      {{- if or $.Values.defaults.podLabels $general.podLabels .podLabels $.Values.defaults.podAnnotations $general.podAnnotations .podAnnotations }}
        metadata:
        {{- if or $.Values.defaults.podLabels $general.podLabels .podLabels }}
          labels:
          {{- with $.Values.defaults.podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
          {{- with $general.podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
          {{- with .podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
        {{- end }}
        {{- if or $.Values.defaults.podAnnotations $general.podAnnotations .podAnnotations }}
          annotations:
          {{- with $.Values.defaults.podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
          {{- with $general.podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
          {{- with .podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 12 }}{{- end }}
        {{- end }}
      {{- else }}
        metadata: {}
      {{- end }}
        spec:
      {{- include "helpers.pod" (dict "value" . "general" $general "name" $name "context" $) | trim | nindent 10 }}
          restartPolicy: {{ .restartPolicy | default "Never" }}
      {{- if ne .commandDurationAlert nil }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cronjob-{{ $cjName }}
  labels:
    prometheus: k8s
    role: alert-rules
  namespace: {{ $.Release.Namespace | quote }}
spec:
  groups:
  - name: "cronJobs_rules"
    interval: 1m # period check for alerts
    rules:
    - alert: "cronjob-{{ $cjName }}-too-long-execution"
      expr: '((time() - kube_job_status_start_time{namespace="{{ $.Release.Namespace }}", job_name=~"{{ $cjName }}-.*"}) and kube_job_status_active{namespace="{{ $.Release.Namespace }}", job_name=~"{{ $cjName }}-.*"} == 1) > {{ .commandDurationAlert }}'
      for: 3m
      labels:
        severity: warning
      annotations:
        message: "CronJob {{ $.Release.Namespace }}/{{ $cjName }} is taking more than {{ .commandDurationAlert }} to complete"
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
