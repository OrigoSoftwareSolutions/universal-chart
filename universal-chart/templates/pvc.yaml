{{- if .Values.pvc }}
  {{- $pvc := .Values.pvc }}
  {{- $name := $pvc.name | default $.Release.Name | trunc 63 | trimSuffix "-" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
  {{- include "helpers.app.labels" $ | nindent 4 }}
  {{- with $pvc.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
  {{- if or $annots (or $pvc.annotations $pvc.keepOnDelete) }}
  annotations:
    {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
    {{- if $pvc.keepOnDelete }}
    helm.sh/resource-policy: keep
    {{- end }}
    {{- with $pvc.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
  {{- end }}
spec:
  accessModes: {{- include "helpers.tplvalues.render" (dict "value" $pvc.accessModes "context" $) | nindent 4 }}
  {{- with $pvc.volumeMode }}
  volumeMode: {{ . }}
  {{- end }}
  {{- with $pvc.volumeName }}
  volumeName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ $pvc.size | default "1Gi" }}
  {{- if hasKey $pvc "storageClassName" }}
  storageClassName: {{ $pvc.storageClassName | quote }}
  {{- end }}
  {{- with $pvc.selector }}
  selector:
    {{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
  {{- end }}
{{- end }}
