{{- $general := $.Values.statefulSetsGeneral -}}
{{- range $name, $sts := .Values.statefulSets }}
  {{- if not (.disabled | default false) }}
---
apiVersion: {{ include "helpers.capabilities.statefulSet.apiVersion" $ }}
kind: StatefulSet
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $general.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- with .labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
    {{- if or $annots $general.annotations .annotations }}
  annotations:
      {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
      {{- with $general.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
      {{- with .annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- end }}
spec:
  replicas: {{ dig "replicas" (dig "replicas" 1 $general) $sts | int }}
    {{- $rhl := dig "revisionHistoryLimit" (dig "revisionHistoryLimit" nil $general) $sts }}
    {{- with $rhl }}
  revisionHistoryLimit: {{ . | int }}
    {{- end }}
    {{- with .updateStrategy }}
  updateStrategy: {{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
  serviceName: {{ include "helpers.app.fullname" (dict "name" (.serviceName | default $name) "context" $) }}
    {{- with .minReadySeconds }}minReadySeconds: {{ . }}{{- end }}
    {{- with .podManagementPolicy }}podManagementPolicy: {{ . }}{{- end }}
  selector:
    matchLabels:
    {{- include "helpers.app.workloadSelectorLabels" (dict "name" $name "context" $) | nindent 6 }}
    {{- with .extraSelectorLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 6 }}{{- end }}
  template:
    metadata:
      labels:
    {{- include "helpers.app.workloadSelectorLabels" (dict "name" $name "context" $) | nindent 8 }}
    {{- with .extraSelectorLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
    {{- with $.Values.defaults.podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
    {{- with $general.podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
    {{- with .podLabels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
    {{- $autoChecksums := include "helpers.workload.autoChecksums" (dict "value" $sts "general" $general "context" $) | trim }}
    {{- if or $.Values.defaults.podAnnotations $general.podAnnotations .podAnnotations $autoChecksums }}
      annotations:
      {{- with $.Values.defaults.podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
      {{- with $general.podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
      {{- with .podAnnotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 8 }}{{- end }}
      {{- if $autoChecksums }}{{ $autoChecksums | nindent 8 }}{{- end }}
    {{- end }}
    spec:
    {{- include "helpers.pod" (dict "value" . "general" $general "name" $name "extraLabels" .extraSelectorLabels "context" $ "autoPvcs" true) | trim | nindent 6 }}
    {{- with .volumeClaimTemplates }}
  volumeClaimTemplates:
      {{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
