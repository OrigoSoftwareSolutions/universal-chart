{{- range $name, $es := .Values.externalSecrets }}
  {{- if not ($es.disabled | default false) }}
---
apiVersion: {{ include "helpers.capabilities.externalSecret.apiVersion" $ }}
kind: ExternalSecret
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $es.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
    {{- if or $annots $es.annotations }}
  annotations:
      {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
      {{- with $es.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- end }}
spec:
    {{- /* Build a shallow copy of the spec to allow safe mutation */}}
    {{- $spec := dict }}
    {{- range $k, $v := $es.spec }}
      {{- $_ := set $spec $k $v }}
    {{- end }}
    {{- /* Auto-resolve secretStoreRef.name when it references a local store */}}
    {{- if $spec.secretStoreRef }}
      {{- $storeKey := $spec.secretStoreRef.name }}
      {{- $storeKind := $spec.secretStoreRef.kind | default "SecretStore" }}
      {{- if and $storeKey (eq $storeKind "SecretStore") (hasKey $.Values.secretStores $storeKey) }}
        {{- $resolvedName := include "helpers.app.fullname" (dict "name" $storeKey "context" $) }}
        {{- $newRef := dict }}
        {{- range $k, $v := $spec.secretStoreRef }}
          {{- $_ := set $newRef $k $v }}
        {{- end }}
        {{- $_ := set $newRef "name" $resolvedName }}
        {{- $_ := set $spec "secretStoreRef" $newRef }}
      {{- end }}
      {{- if and $storeKey (eq $storeKind "ClusterSecretStore") (hasKey $.Values.clusterSecretStores $storeKey) }}
        {{- $resolvedName := include "helpers.app.fullname" (dict "name" $storeKey "context" $) }}
        {{- $newRef := dict }}
        {{- range $k, $v := $spec.secretStoreRef }}
          {{- $_ := set $newRef $k $v }}
        {{- end }}
        {{- $_ := set $newRef "name" $resolvedName }}
        {{- $_ := set $spec "secretStoreRef" $newRef }}
      {{- end }}
    {{- end }}
    {{- include "helpers.tplvalues.render" (dict "value" $spec "context" $) | nindent 2 }}
  {{- end }}
{{- end }}
