{{- range $name, $ces := .Values.clusterExternalSecrets }}
  {{- if not ($ces.disabled | default false) }}
---
apiVersion: {{ include "helpers.capabilities.externalSecret.apiVersion" $ }}
kind: ClusterExternalSecret
metadata:
  name: {{ include "helpers.app.fullname" (dict "name" $name "context" $) }}
  labels:
    {{- include "helpers.app.labels" $ | nindent 4 }}
    {{- with $ces.labels }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- $annots := include "helpers.app.defaultAnnotations" $ | trim }}
    {{- if or $annots $ces.annotations }}
  annotations:
      {{- if $annots }}{{ $annots | nindent 4 }}{{- end }}
      {{- with $ces.annotations }}{{- include "helpers.tplvalues.render" (dict "value" . "context" $) | nindent 4 }}{{- end }}
    {{- end }}
spec:
    {{- /* Build a shallow copy of the spec to allow safe mutation */}}
    {{- $spec := dict }}
    {{- range $k, $v := $ces.spec }}
      {{- $_ := set $spec $k $v }}
    {{- end }}
    {{- /* Auto-resolve secretStoreRef.name inside externalSecretSpec when it references a local ClusterSecretStore */}}
    {{- if $spec.externalSecretSpec.secretStoreRef }}
      {{- $storeKey := $spec.externalSecretSpec.secretStoreRef.name }}
      {{- $storeKind := $spec.externalSecretSpec.secretStoreRef.kind | default "ClusterSecretStore" }}
      {{- if and $storeKey (eq $storeKind "ClusterSecretStore") (hasKey $.Values.clusterSecretStores $storeKey) }}
        {{- $resolvedName := include "helpers.app.fullname" (dict "name" $storeKey "context" $) }}
        {{- $newRef := dict }}
        {{- range $k, $v := $spec.externalSecretSpec.secretStoreRef }}
          {{- $_ := set $newRef $k $v }}
        {{- end }}
        {{- $_ := set $newRef "name" $resolvedName }}
        {{- $_ := set $spec.externalSecretSpec "secretStoreRef" $newRef }}
      {{- end }}
    {{- end }}
    {{- include "helpers.tplvalues.render" (dict "value" $spec "context" $) | nindent 2 }}
  {{- end }}
{{- end }}
