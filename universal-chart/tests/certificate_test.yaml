suite: certificate template
templates:
  - certificate.yaml
tests:
  - it: renders a certificate when cert-manager is available
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.issuerRef.kind: ClusterIssuer
      certificates.my-cert.issuerRef.originalName: letsencrypt-prod
      certificates.my-cert.secretName: my-cert-tls
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: apiVersion
          value: cert-manager.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-cert$
      - equal:
          path: spec.dnsNames[0]
          value: example.com
      - equal:
          path: spec.issuerRef.name
          value: letsencrypt-prod
      - equal:
          path: spec.issuerRef.kind
          value: ClusterIssuer

  - it: falls back to v1alpha2 without cert-manager v1
    set:
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.secretName: my-cert-tls
    asserts:
      - isKind:
          of: Certificate
      - equal:
          path: apiVersion
          value: cert-manager.io/v1alpha2

  - it: renders issuerref with helper fullname when original name is omitted
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.issuerRef.kind: Issuer
      certificates.my-cert.secretName: my-cert-tls
    asserts:
      - matchRegex:
          path: spec.issuerRef.name
          pattern: -letsencrypt$

  - it: includes namespace in metadata
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.secretName: my-cert-tls
    asserts:
      - isNotEmpty:
          path: metadata.namespace

  - it: includes defaults.annotations on certificate metadata
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      defaults:
        annotations:
          global: from-defaults
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.secretName: my-cert-tls
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults

  - it: merges defaults.annotations with instance annotations on certificate metadata
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      defaults:
        annotations:
          global: from-defaults
      certificates.my-cert.dnsNames[0]: example.com
      certificates.my-cert.issuerRef.name: letsencrypt
      certificates.my-cert.secretName: my-cert-tls
      certificates.my-cert.annotations:
        instance: from-cert
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults
      - equal:
          path: metadata.annotations.instance
          value: from-cert
