suite: cronjob
templates:
  - cronjob.yaml
tests:
  - it: renders a CronJob with correct kind and apiVersion
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - isKind:
          of: CronJob
      - matchRegex:
          path: metadata.name
          pattern: -cleanup$
      - isNotEmpty:
          path: metadata.namespace

  - it: respects the disabled flag
    set:
      cronJobs:
        cleanup:
          disabled: true
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PrometheusRule with release namespace
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          commandDurationAlert: 600
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1
      - isNotEmpty:
          path: metadata.namespace
        documentIndex: 1

  - it: singleOnly sets concurrencyPolicy to Forbid
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          singleOnly: true
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: explicit concurrencyPolicy overrides singleOnly
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          singleOnly: true
          concurrencyPolicy: Replace
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Replace

  - it: concurrencyPolicy Allow can be set explicitly
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          concurrencyPolicy: Allow
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Allow

  - it: omits concurrencyPolicy when neither singleOnly nor concurrencyPolicy set
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - notExists:
          path: spec.concurrencyPolicy

  - it: omits suspend when not set
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - notExists:
          path: spec.suspend

  - it: emits suspend false when explicitly set
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          suspend: false
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.suspend
          value: false

  - it: emits suspend true when set
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          suspend: true
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.suspend
          value: true

  - it: cronJobsGeneral.podLabels appears in pod template
    set:
      cronJobsGeneral:
        podLabels:
          team: platform
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.labels.team
          value: platform

  - it: cronJobsGeneral.podAnnotations appears in pod template
    set:
      cronJobsGeneral:
        podAnnotations:
          cron-owner: platform-team
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata.annotations.cron-owner
          value: platform-team

  - it: renders backoffLimit zero
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          backoffLimit: 0
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 0

  - it: renders successfulJobsHistoryLimit zero
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          successfulJobsHistoryLimit: 0
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.successfulJobsHistoryLimit
          value: 0

  - it: renders failedJobsHistoryLimit zero
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          failedJobsHistoryLimit: 0
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.failedJobsHistoryLimit
          value: 0

  - it: renders PrometheusRule when commandDurationAlert is zero
    set:
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          commandDurationAlert: 0
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1

  - it: timeZone cascades from cronJobsGeneral
    set:
      cronJobsGeneral:
        timeZone: America/New_York
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.timeZone
          value: "America/New_York"

  - it: instance timeZone overrides cronJobsGeneral
    set:
      cronJobsGeneral:
        timeZone: America/New_York
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          timeZone: Europe/London
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.timeZone
          value: "Europe/London"

  # ── restartPolicy general-tier cascade ────────────────────────────
  - it: cronJobsGeneral.restartPolicy overrides default Never
    set:
      cronJobsGeneral:
        restartPolicy: OnFailure
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: OnFailure

  - it: instance restartPolicy overrides cronJobsGeneral
    set:
      cronJobsGeneral:
        restartPolicy: OnFailure
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          restartPolicy: Never
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.restartPolicy
          value: Never

  # ── commandDurationAlert general-tier cascade ─────────────────────
  - it: cronJobsGeneral.commandDurationAlert renders PrometheusRule with general value
    set:
      cronJobsGeneral:
        commandDurationAlert: 1200
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1
      - matchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: "> 1200"
        documentIndex: 1
      - matchRegex:
          path: spec.groups[0].rules[0].annotations.message
          pattern: "more than 1200"
        documentIndex: 1

  - it: instance commandDurationAlert overrides cronJobsGeneral
    set:
      cronJobsGeneral:
        commandDurationAlert: 1200
      cronJobs:
        cleanup:
          schedule: "*/5 * * * *"
          commandDurationAlert: 3600
          containers:
            - name: cleanup
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - matchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: "> 3600"
        documentIndex: 1

  - it: commandDurationAlert PrometheusRule uses default labels when no override
    set:
      cronJobs:
        etl:
          schedule: "0 * * * *"
          image: nginx
          commandDurationAlert: 1800
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: PrometheusRule
      - documentIndex: 1
        equal:
          path: metadata.labels.prometheus
          value: k8s
      - documentIndex: 1
        equal:
          path: metadata.labels.role
          value: alert-rules
      - documentIndex: 1
        equal:
          path: spec.groups[0].rules[0].labels.severity
          value: warning

  - it: commandDurationAlertLabels overrides PrometheusRule metadata.labels
    set:
      cronJobs:
        etl:
          schedule: "0 * * * *"
          image: nginx
          commandDurationAlert: 1800
          commandDurationAlertLabels:
            release: kps
            tier: platform
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.labels.release
          value: kps
      - documentIndex: 1
        equal:
          path: metadata.labels.tier
          value: platform
      - documentIndex: 1
        notExists:
          path: metadata.labels.prometheus

  - it: commandDurationAlertRuleLabels overrides alert rule labels
    set:
      cronJobs:
        etl:
          schedule: "0 * * * *"
          image: nginx
          commandDurationAlert: 1800
          commandDurationAlertRuleLabels:
            severity: critical
            team: data
    asserts:
      - documentIndex: 1
        equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - documentIndex: 1
        equal:
          path: spec.groups[0].rules[0].labels.team
          value: data

  - it: cronJobsGeneral commandDurationAlertLabels propagates to all cronjobs
    set:
      cronJobsGeneral:
        commandDurationAlertLabels:
          release: kps
      cronJobs:
        etl:
          schedule: "0 * * * *"
          image: nginx
          commandDurationAlert: 1800
    asserts:
      - documentIndex: 1
        equal:
          path: metadata.labels.release
          value: kps
