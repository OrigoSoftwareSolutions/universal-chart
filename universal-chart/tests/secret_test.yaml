suite: secret
templates:
  - secret.yaml
tests:
  # ── Auto-generated secret-envs Secret ──────────────────────────────────────
  - it: renders secret-envs when secretEnvs is set
    set:
      secretEnvs:
        DB_PASSWORD: c2VjcmV0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: apiVersion
          value: v1
      - equal:
          path: type
          value: Opaque
      - matchRegex:
          path: metadata.name
          pattern: -secret-envs$
      - isNotEmpty:
          path: metadata.namespace

  - it: renders secret-envs when secretEnvsString is set
    set:
      secretEnvsString: |
        TOKEN: dG9rZW4=
    asserts:
      - isKind:
          of: Secret
      - matchRegex:
          path: metadata.name
          pattern: -secret-envs$

  - it: does not render secret-envs when both are empty
    set:
      secretEnvs: {}
      secretEnvsString: ""
    asserts:
      - hasDocuments:
          count: 0

  # ── Custom secrets ─────────────────────────────────────────────────────────
  - it: renders custom Secret with data
    set:
      secrets:
        db-creds:
          data:
            password: cGFzcw==
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - matchRegex:
          path: metadata.name
          pattern: -db-creds$
      - isNotEmpty:
          path: metadata.namespace

  - it: renders custom Secret with type override
    set:
      secrets:
        tls-cert:
          type: kubernetes.io/tls
          data:
            tls.crt: Y2VydA==
            tls.key: a2V5
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls

  - it: renders custom Secret with labels and annotations
    set:
      secrets:
        labeled:
          data:
            key: dmFs
          labels:
            team: platform
          annotations:
            note: important
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            team: platform
      - equal:
          path: metadata.annotations.note
          value: important

  - it: user annotations override defaults on the same key
    set:
      defaults:
        annotations:
          team: platform
      secrets:
        labeled:
          data:
            key: dmFs
          annotations:
            team: app
    asserts:
      - equal:
          path: metadata.annotations.team
          value: app

  - it: adds keep annotation when keepOnDelete is true
    set:
      secrets:
        retained:
          keepOnDelete: true
          data:
            key: dmFs
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: does not add keep annotation when keepOnDelete is false
    set:
      secrets:
        retained:
          data:
            key: dmFs
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]

  - it: skips secret with reserved name secret-envs
    set:
      secrets:
        secret-envs:
          data:
            SHOULD: not-render
    asserts:
      - hasDocuments:
          count: 0

  - it: respects the disabled flag for custom secrets
    set:
      secrets:
        disabled-secret:
          disabled: true
          data:
            key: dmFsdWU=
    asserts:
      - hasDocuments:
          count: 0

  - it: renders both secret-envs and custom secret
    set:
      secretEnvs:
        DB_PASSWORD: c2VjcmV0
      secrets:
        app-secret:
          data:
            api-key: a2V5
    asserts:
      - hasDocuments:
          count: 2

  - it: defaults.annotations appear on auto-generated secret-envs
    set:
      defaults:
        annotations:
          team: platform
      secretEnvs:
        DB_PASSWORD: c2VjcmV0
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: defaults.annotations appear on user-defined secret without instance annotations
    set:
      defaults:
        annotations:
          team: platform
      secrets:
        app-secret:
          data:
            key: val
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: defaults.annotations merge with instance annotations on user-defined secret
    set:
      defaults:
        annotations:
          team: platform
      secrets:
        app-secret:
          annotations:
            custom: value
          data:
            key: val
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.custom
          value: value

  # ── stringData support ──────────────────────────────────────────────────────
  - it: renders stringData without base64-encoding
    set:
      secrets:
        env-secret:
          stringData:
            TOKEN: myplaintoken
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.TOKEN
          value: myplaintoken
      - notExists:
          path: data

  - it: renders both data and stringData in one Secret
    set:
      secrets:
        mixed:
          data:
            encoded: b64:dGVzdA==
          stringData:
            plain: hello
    asserts:
      - equal:
          path: data.encoded
          value: dGVzdA==
      - equal:
          path: stringData.plain
          value: hello

  # ── immutable field ────────────────────────────────────────────────
  - it: renders immutable true when set
    set:
      secrets:
        my-secret:
          immutable: true
          data:
            key: dmFsdWU=
    asserts:
      - equal:
          path: immutable
          value: true

  - it: omits immutable when not set
    set:
      secrets:
        my-secret:
          data:
            key: dmFsdWU=
    asserts:
      - notExists:
          path: immutable
