suite: deployment
templates:
  - deployment.yaml
tests:
  - it: renders a Deployment with correct kind and apiVersion
    set:
      deployments:
        web:
          containers:
            - name: web
              image: nginx
              imageTag: "1.25"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - matchRegex:
          path: metadata.name
          pattern: -web$
      - isNotEmpty:
          path: metadata.labels

  - it: respects the disabled flag
    set:
      deployments:
        web:
          disabled: true
          containers:
            - name: web
              image: nginx
              imageTag: "1.25"
    asserts:
      - hasDocuments:
          count: 0

  - it: sets imagePullSecrets from top-level array
    set:
      imagePullSecrets:
        - my-registry-secret
        - other-registry-secret
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: other-registry-secret

  - it: omits imagePullSecrets when array is empty
    set:
      imagePullSecrets: []
      deployments.web.image: nginx
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: injects global envs configmap into workload envFrom
    set:
      envs:
        LOG_LEVEL: info
      deployments.web.image: nginx
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-envs
      - exists:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: injects global secret envs secret into workload envFrom
    set:
      secretEnvs:
        API_KEY: super-secret
      deployments.web.image: nginx
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-secret-envs
      - exists:
          path: spec.template.metadata.annotations.checksum/secret-secret-envs

  - it: omits global envs envFrom when top-level envs are empty
    set:
      envs: {}
      envsString: ""
      deployments.web.image: nginx
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: does not duplicate global envs configmap when workload already references envs
    set:
      envs:
        LOG_LEVEL: info
      deployments:
        web:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom
          value:
            - configMapRef:
                name: RELEASE-NAME-envs

  - it: merges defaults.annotations into deployment metadata
    set:
      defaults:
        annotations:
          team: platform
          env: prod
      deployments.web.image: nginx
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            team: platform
            env: prod

  - it: renders dnsConfig in the pod spec
    set:
      deployments:
        web:
          image: nginx
          dnsConfig:
            options:
              - name: ndots
                value: "2"
            searches:
              - svc.cluster.local
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.options[0].name
          value: ndots
      - equal:
          path: spec.template.spec.dnsConfig.options[0].value
          value: "2"
      - equal:
          path: spec.template.spec.dnsConfig.searches[0]
          value: svc.cluster.local

  - it: dnsConfig cascades from deploymentsGeneral when not set on instance
    set:
      deploymentsGeneral:
        dnsConfig:
          options:
            - name: ndots
              value: "5"
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.options[0].name
          value: ndots
      - equal:
          path: spec.template.spec.dnsConfig.options[0].value
          value: "5"

  - it: dnsConfig cascades from defaults when not set on instance or general
    set:
      defaults:
        dnsConfig:
          options:
            - name: ndots
              value: "1"
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.options[0].name
          value: ndots
      - equal:
          path: spec.template.spec.dnsConfig.options[0].value
          value: "1"

  - it: instance dnsConfig overrides defaults and general
    set:
      defaults:
        dnsConfig:
          options:
            - name: ndots
              value: "1"
      deploymentsGeneral:
        dnsConfig:
          options:
            - name: ndots
              value: "5"
      deployments:
        web:
          image: nginx
          dnsConfig:
            options:
              - name: ndots
                value: "2"
    asserts:
      - equal:
          path: spec.template.spec.dnsConfig.options[0].value
          value: "2"

  - it: renders minReadySeconds in deployment spec only
    set:
      deployments:
        web:
          image: nginx
          minReadySeconds: 30
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 30
      - notExists:
          path: spec.template.spec.minReadySeconds

  - it: diagnosticMode overrides command and args and suppresses probes
    set:
      diagnosticMode:
        enabled: true
      deployments.web.image: nginx
      deployments.web.command:
        - python
        - app.py
      deployments.web.healthCheck:
        path: /healthz
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: sleep
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: infinity
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: renders HTTPS scheme for shorthand liveness and readiness probes
    set:
      deployments:
        web:
          image: nginx
          healthCheck:
            path: /healthz
            scheme: HTTPS
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.scheme
          value: HTTPS

  - it: renders successThreshold for shorthand liveness and readiness probes only
    set:
      deployments:
        web:
          image: nginx
          healthCheck:
            path: /healthz
            successThreshold: 3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.successThreshold
          value: 3
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.successThreshold
          value: 3
      - notExists:
          path: spec.template.spec.containers[0].startupProbe.successThreshold

  - it: injects preStopSleep lifecycle hook from defaults
    set:
      defaults:
        preStopSleep: 5
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command
          value:
            - sh
            - -c
            - sleep 5

  - it: init container does not get preStopSleep lifecycle
    set:
      defaults.preStopSleep: 5
      deployments:
        test:
          image: nginx
          imageTag: latest
          initContainers:
            - name: init
              image: busybox
              imageTag: latest
    asserts:
      - notExists:
          path: spec.template.spec.initContainers[0].lifecycle

  - it: regular container gets preStopSleep lifecycle
    set:
      defaults.preStopSleep: 5
      deployments.test.image: nginx
      deployments.test.imageTag: latest
    asserts:
      - exists:
          path: spec.template.spec.containers[0].lifecycle

  - it: init container respects explicit lifecycle
    set:
      defaults.preStopSleep: 5
      deployments:
        test:
          image: nginx
          imageTag: latest
          initContainers:
            - name: init
              image: busybox
              imageTag: latest
              lifecycle:
                preStop:
                  exec:
                    command:
                      - sh
                      - -c
                      - echo done
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].lifecycle.preStop.exec.command
          value:
            - sh
            - -c
            - echo done

  - it: renders hostPath typed volume
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: varlog
          type: hostPath
          path: /var/log
          hostPathType: Directory
      deployments.web.volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: varlog
            hostPath:
              path: /var/log
              type: Directory
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: varlog
            mountPath: /var/log
            readOnly: true

  - it: renders configMap typed volume with explicit configMapName
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: config
          type: configMap
          configMapName: app-config
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: app-config

  - it: renders secret typed volume with explicit secretName
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: certs
          type: secret
          secretName: tls-certs
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: certs
            secret:
              secretName: tls-certs

  - it: renders pvc typed volume with explicit claimName
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: data
          type: pvc
          claimName: my-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: my-pvc

  - it: keeps backward-compatible secret typed volume naming without secretName
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: certs
          type: secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: certs
            secret:
              secretName: "RELEASE-NAME-certs"

  - it: mounts PVCs scoped to the matching workload
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: web
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data

  - it: skips PVCs scoped to other workloads
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: api
    asserts:
      - equal:
          path: spec.template.spec.volumes
          value: []
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []

  - it: mounts PVCs without workloads field into all matching workloads
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data

  - it: does not double-tag when container image has embedded tag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: "nginx:1.20"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:1.20"

  - it: does not append default tag to explicit container image without imageTag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: "registry.example.com:5000/myapp"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com:5000/myapp"

  - it: uses explicit imageTag even when image has no embedded tag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: nginx
              imageTag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:1.25"

  - it: appends default tag to single-container shorthand image without imageTag
    set:
      deployments:
        web:
          image: nginx
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:v0.0.1"

  - it: merges imagePullSecrets from all sources (top-level + defaults + workload)
    set:
      imagePullSecrets:
        - global-secret
      defaults:
        extraImagePullSecrets:
          - defaults-secret
      deployments:
        web:
          image: nginx
          extraImagePullSecrets:
            - workload-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: global-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: defaults-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: workload-secret

  - it: merges deprecated workload imagePullSecrets alongside extraImagePullSecrets
    set:
      deployments:
        web:
          image: nginx
          imagePullSecrets:
            - deprecated-secret
          extraImagePullSecrets:
            - extra-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: deprecated-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: extra-secret

  - it: deduplicates imagePullSecrets that appear in multiple sources
    set:
      imagePullSecrets:
        - shared-secret
      defaults:
        extraImagePullSecrets:
          - shared-secret
      deployments:
        web:
          image: nginx
          extraImagePullSecrets:
            - shared-secret
    asserts:
      - lengthEqual:
          path: spec.template.spec.imagePullSecrets
          count: 1
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: shared-secret

  - it: initContainers inherit workload containerSecurityContext
    set:
      deployments:
        web:
          image: nginx
          containerSecurityContext:
            runAsUser: 1000
            readOnlyRootFilesystem: true
          initContainers:
            - image: busybox
              command: ["sh", "-c", "echo init"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: initContainers own securityContext overrides workload containerSecurityContext
    set:
      deployments:
        web:
          image: nginx
          containerSecurityContext:
            runAsUser: 1000
          initContainers:
            - image: busybox
              securityContext:
                runAsUser: 2000
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 2000

  - it: uses defaults.revisionHistoryLimit when neither instance nor general set it
    set:
      deployments.web.image: nginx
      defaults.revisionHistoryLimit: 3
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: defaults.revisionHistoryLimit is overridden by deploymentsGeneral
    set:
      defaults.revisionHistoryLimit: 3
      deploymentsGeneral.revisionHistoryLimit: 7
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 7

  - it: sets revisionHistoryLimit from instance
    set:
      deployments:
        web:
          image: nginx
          revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: inherits revisionHistoryLimit from deploymentsGeneral
    set:
      deploymentsGeneral:
        revisionHistoryLimit: 3
      deployments:
        web:
          image: nginx
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: instance revisionHistoryLimit overrides deploymentsGeneral
    set:
      deploymentsGeneral:
        revisionHistoryLimit: 3
      deployments:
        web:
          image: nginx
          revisionHistoryLimit: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10

  - it: default resources include memory limit 128Mi
    set:
      deployments.test.image: nginx
      deployments.test.imageTag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: custom resources override defaults entirely
    set:
      deployments.test.image: nginx
      deployments.test.imageTag: latest
      deployments.test.resources.requests.memory: 512Mi
      deployments.test.resources.limits.memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - notExists:
          path: spec.template.spec.containers[0].resources.requests.cpu
