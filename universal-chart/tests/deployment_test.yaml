suite: deployment
templates:
  - deployment.yaml
tests:
  - it: renders a Deployment with correct kind and apiVersion
    set:
      deployments.web.containers[0].name: web
      deployments.web.containers[0].image: nginx
      deployments.web.containers[0].imageTag: "1.25"
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: apiVersion
          value: apps/v1
      - matchRegex:
          path: metadata.name
          pattern: -web$
      - isNotEmpty:
          path: metadata.labels

  - it: respects the disabled flag
    set:
      deployments.web.disabled: true
      deployments.web.containers[0].name: web
      deployments.web.containers[0].image: nginx
      deployments.web.containers[0].imageTag: "1.25"
    asserts:
      - hasDocuments:
          count: 0

  - it: sets imagePullSecrets from top-level array
    set:
      imagePullSecrets:
        - my-registry-secret
        - other-registry-secret
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-registry-secret
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: other-registry-secret

  - it: omits imagePullSecrets when array is empty
    set:
      imagePullSecrets: []
      deployments.web.image: nginx
    asserts:
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: injects global envs configmap into workload envFrom
    set:
      envs:
        LOG_LEVEL: info
      deployments.web.image: nginx
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: RELEASE-NAME-envs
      - exists:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: injects global secret envs secret into workload envFrom
    set:
      secretEnvs:
        API_KEY: super-secret
      deployments.web.image: nginx
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: RELEASE-NAME-secret-envs
      - exists:
          path: spec.template.metadata.annotations.checksum/secret-secret-envs

  - it: omits global envs envFrom when top-level envs are empty
    set:
      envs: {}
      envsString: ""
      deployments.web.image: nginx
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].envFrom

  - it: does not duplicate global envs configmap when workload already references envs
    set:
      envs:
        LOG_LEVEL: info
      deployments:
        web:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom
          value:
            - configMapRef:
                name: RELEASE-NAME-envs

  - it: merges defaults.annotations into deployment metadata
    set:
      defaults:
        annotations:
          team: platform
          env: prod
      deployments.web.image: nginx
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            team: platform
            env: prod

  - it: diagnosticMode overrides command and args and suppresses probes
    set:
      diagnosticMode:
        enabled: true
      deployments.web.image: nginx
      deployments.web.command:
        - python
        - app.py
      deployments.web.healthCheck:
        path: /healthz
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: sleep
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: infinity
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: injects preStopSleep lifecycle hook from defaults
    set:
      defaults:
        preStopSleep: 5
      deployments.web.image: nginx
    asserts:
      - equal:
          path: spec.template.spec.containers[0].lifecycle.preStop.exec.command
          value:
            - sh
            - -c
            - sleep 5

  - it: init container does not get preStopSleep lifecycle
    set:
      defaults.preStopSleep: 5
      deployments.test.image: nginx
      deployments.test.imageTag: latest
      deployments.test.initContainers[0].name: init
      deployments.test.initContainers[0].image: busybox
      deployments.test.initContainers[0].imageTag: latest
    asserts:
      - notExists:
          path: spec.template.spec.initContainers[0].lifecycle

  - it: regular container gets preStopSleep lifecycle
    set:
      defaults.preStopSleep: 5
      deployments.test.image: nginx
      deployments.test.imageTag: latest
    asserts:
      - exists:
          path: spec.template.spec.containers[0].lifecycle

  - it: init container respects explicit lifecycle
    set:
      defaults.preStopSleep: 5
      deployments:
        test:
          image: nginx
          imageTag: latest
          initContainers:
            - name: init
              image: busybox
              imageTag: latest
              lifecycle:
                preStop:
                  exec:
                    command:
                      - sh
                      - -c
                      - echo done
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].lifecycle.preStop.exec.command
          value:
            - sh
            - -c
            - echo done

  - it: renders hostPath typed volume
    set:
      deployments.web.image: nginx
      deployments.web.volumes:
        - name: varlog
          type: hostPath
          path: /var/log
          hostPathType: Directory
      deployments.web.volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: varlog
            hostPath:
              path: /var/log
              type: Directory
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: varlog
            mountPath: /var/log
            readOnly: true

  - it: mounts PVCs scoped to the matching workload
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: web
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data

  - it: skips PVCs scoped to other workloads
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: api
    asserts:
      - equal:
          path: spec.template.spec.volumes
          value: []
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []

  - it: mounts PVCs without workloads field into all matching workloads
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      deployments.web.ports.http: 8080
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.size: 8Gi
      pvcs.shared.mountPath: /data
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data

  - it: does not double-tag when container image has embedded tag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: "nginx:1.20"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:1.20"

  - it: appends default tag to registry-with-port image without embedded tag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: "registry.example.com:5000/myapp"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "registry.example.com:5000/myapp:v0.0.1"

  - it: uses explicit imageTag even when image has no embedded tag
    set:
      deployments:
        web:
          containers:
            - name: app
              image: nginx
              imageTag: "1.25"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "nginx:1.25"

  - it: merges imagePullSecrets from all sources (top-level + defaults + workload)
    set:
      imagePullSecrets:
        - global-secret
      defaults:
        extraImagePullSecrets:
          - defaults-secret
      deployments:
        web:
          image: nginx
          extraImagePullSecrets:
            - workload-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: global-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: defaults-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: workload-secret

  - it: merges deprecated workload imagePullSecrets alongside extraImagePullSecrets
    set:
      deployments:
        web:
          image: nginx
          imagePullSecrets:
            - deprecated-secret
          extraImagePullSecrets:
            - extra-secret
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: deprecated-secret
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: extra-secret

  - it: initContainers inherit workload containerSecurityContext
    set:
      deployments:
        web:
          image: nginx
          containerSecurityContext:
            runAsUser: 1000
            readOnlyRootFilesystem: true
          initContainers:
            - image: busybox
              command: ["sh", "-c", "echo init"]
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: initContainers own securityContext overrides workload containerSecurityContext
    set:
      deployments:
        web:
          image: nginx
          containerSecurityContext:
            runAsUser: 1000
          initContainers:
            - image: busybox
              securityContext:
                runAsUser: 2000
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 2000

  - it: omits revisionHistoryLimit when not set
    set:
      deployments.web.image: nginx
    asserts:
      - notExists:
          path: spec.revisionHistoryLimit

  - it: sets revisionHistoryLimit from instance
    set:
      deployments:
        web:
          image: nginx
          revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: inherits revisionHistoryLimit from deploymentsGeneral
    set:
      deploymentsGeneral:
        revisionHistoryLimit: 3
      deployments:
        web:
          image: nginx
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: instance revisionHistoryLimit overrides deploymentsGeneral
    set:
      deploymentsGeneral:
        revisionHistoryLimit: 3
      deployments:
        web:
          image: nginx
          revisionHistoryLimit: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10

  - it: default resources include memory limit 128Mi
    set:
      deployments.test.image: nginx
      deployments.test.imageTag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi

  - it: custom resources override defaults entirely
    set:
      deployments.test.image: nginx
      deployments.test.imageTag: latest
      deployments.test.resources.requests.memory: 512Mi
      deployments.test.resources.limits.memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - notExists:
          path: spec.template.spec.containers[0].resources.requests.cpu
