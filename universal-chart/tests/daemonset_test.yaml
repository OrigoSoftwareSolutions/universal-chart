suite: DaemonSet template
templates:
  - daemonset.yaml
tests:
  - it: renders a DaemonSet with correct apiVersion and kind
    set:
      daemonSets.agent.image: datadog/agent:7
    asserts:
      - isKind:
          of: DaemonSet
      - isAPIVersion:
          of: apps/v1

  - it: does not render when disabled
    set:
      daemonSets.agent.image: datadog/agent:7
      daemonSets.agent.disabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: sets updateStrategy when provided
    set:
      daemonSets.agent.image: datadog/agent:7
      daemonSets.agent.updateStrategy.type: RollingUpdate
      daemonSets.agent.updateStrategy.rollingUpdate.maxUnavailable: 1
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate

  - it: has no replicas field
    set:
      daemonSets.agent.image: datadog/agent:7
    asserts:
      - notExists:
          path: spec.replicas

  - it: has no progressDeadlineSeconds field
    set:
      daemonSets.agent.image: datadog/agent:7
    asserts:
      - notExists:
          path: spec.progressDeadlineSeconds

  - it: daemonSetsGeneral.podLabels appears in pod template
    set:
      daemonSetsGeneral:
        podLabels:
          team: infra
      daemonSets:
        agent:
          image: datadog/agent:7
    asserts:
      - equal:
          path: spec.template.metadata.labels.team
          value: infra

  - it: daemonSetsGeneral.podAnnotations appears in pod template
    set:
      daemonSetsGeneral:
        podAnnotations:
          log-collector: enabled
      daemonSets:
        agent:
          image: datadog/agent:7
    asserts:
      - equal:
          path: spec.template.metadata.annotations.log-collector
          value: enabled

  - it: adds app.kubernetes.io/component label to daemonset matchLabels and pod labels
    set:
      daemonSets:
        agent:
          image: datadog/agent:7
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: agent
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: agent

  - it: uses defaults.revisionHistoryLimit when neither instance nor general set it
    set:
      defaults.revisionHistoryLimit: 3
      daemonSets.agent.image: datadog/agent:7
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: revisionHistoryLimit 0 is rendered not silently dropped
    set:
      daemonSets:
        agent:
          image: datadog/agent:7
          revisionHistoryLimit: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: minReadySeconds 0 is rendered not silently dropped
    set:
      daemonSets:
        agent:
          image: datadog/agent:7
          minReadySeconds: 0
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 0

  - it: defaults.revisionHistoryLimit is overridden by daemonSetsGeneral
    set:
      defaults.revisionHistoryLimit: 3
      daemonSetsGeneral.revisionHistoryLimit: 7
      daemonSets.agent.image: datadog/agent:7
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 7

  - it: sets revisionHistoryLimit from instance
    set:
      daemonSets:
        agent:
          image: datadog/agent:7
          revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: inherits revisionHistoryLimit from daemonSetsGeneral
    set:
      daemonSetsGeneral:
        revisionHistoryLimit: 3
      daemonSets:
        agent:
          image: datadog/agent:7
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: instance revisionHistoryLimit overrides daemonSetsGeneral
    set:
      daemonSetsGeneral:
        revisionHistoryLimit: 3
      daemonSets:
        agent:
          image: datadog/agent:7
          revisionHistoryLimit: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10
