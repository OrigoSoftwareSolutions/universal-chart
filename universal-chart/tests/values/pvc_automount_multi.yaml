deployments:
  web:
    image: nginx
    imageTag: "1.25"
    ports:
      http: 8080

pvcs:
  app-data:
    accessModes: [ReadWriteOnce]
    size: 8Gi
    mountPath: /data
  cache:
    accessModes: [ReadWriteOnce]
    size: 2Gi
    mountPath: /cache
  logs:
    accessModes: [ReadWriteOnce]
    size: 5Gi
