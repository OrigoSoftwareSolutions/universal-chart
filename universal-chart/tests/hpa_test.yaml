suite: hpa
templates:
  - hpa.yaml
tests:
  - it: renders an HPA with correct kind and apiVersion
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.scaleTargetRef.kind: Deployment
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: apiVersion
          value: autoscaling/v2
      - matchRegex:
          path: metadata.name
          pattern: -web$
      - isNotEmpty:
          path: metadata.namespace

  - it: respects the disabled flag
    set:
      hpas.web.disabled: true
      hpas.web.scaleTargetRef.name: web
      hpas.web.scaleTargetRef.kind: Deployment
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
    asserts:
      - hasDocuments:
          count: 0

  - it: includes defaults.annotations on hpa
    set:
      defaults:
        annotations:
          global: from-defaults
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults

  - it: merges defaults.annotations with instance annotations
    set:
      defaults:
        annotations:
          global: from-defaults
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
      hpas.web.annotations:
        instance: from-hpa
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults
      - equal:
          path: metadata.annotations.instance
          value: from-hpa

  - it: renders targetMemory metric when set
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetMemory: 80
    asserts:
      - contains:
          path: spec.metrics
          content:
            type: Resource
            resource:
              name: memory
              target:
                type: Utilization
                averageUtilization: 80

  - it: keeps deployment as an allowed hpa target kind
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.scaleTargetRef.kind: Deployment
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
    asserts:
      - equal:
          path: spec.scaleTargetRef.kind
          value: Deployment

  - it: default minReplicas and maxReplicas are integers not strings
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 3
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 3

  - it: explicit minReplicas and maxReplicas render as integers
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 1
      hpas.web.maxReplicas: 10
    asserts:
      - equal:
          path: spec.minReplicas
          value: 1
      - equal:
          path: spec.maxReplicas
          value: 10

  - it: omits metrics key entirely when no targetCPU targetMemory or custom metrics are set
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
    asserts:
      - notExists:
          path: spec.metrics

  - it: renders metrics key when only targetCPU is set
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
    asserts:
      - isNotEmpty:
          path: spec.metrics

  - it: renders behavior block when set
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
      hpas.web.targetCPU: 70
      hpas.web.behavior.scaleDown.stabilizationWindowSeconds: 300
    asserts:
      - equal:
          path: spec.behavior.scaleDown.stabilizationWindowSeconds
          value: 300

  - it: defaults minReplicas to 2 and maxReplicas to 3 when both are omitted
    set:
      hpas.web.scaleTargetRef.name: web
    asserts:
      - equal:
          path: spec.minReplicas
          value: 2
      - equal:
          path: spec.maxReplicas
          value: 3

  - it: renders a custom scaleTargetRef.apiVersion when set
    set:
      hpas.web.scaleTargetRef.name: web
      hpas.web.scaleTargetRef.apiVersion: apps/v1beta1
      hpas.web.minReplicas: 2
      hpas.web.maxReplicas: 5
    asserts:
      - equal:
          path: spec.scaleTargetRef.apiVersion
          value: apps/v1beta1
