suite: hooks
templates:
  - helm-hooks.yaml
tests:
  - it: renders a hook Job with correct kind and apiVersion
    set:
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - isKind:
          of: Job
      - equal:
          path: apiVersion
          value: batch/v1
      - matchRegex:
          path: metadata.name
          pattern: -migration$
      - isNotEmpty:
          path: metadata.namespace
      - isNotEmpty:
          path: metadata.annotations["helm.sh/hook"]

  - it: skips rendering when disabled is true
    set:
      hooks:
        migration:
          disabled: true
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 0

  - it: skips only disabled hook among multiple
    set:
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
        cleanup:
          disabled: true
          containers:
            - name: clean
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 1

  - it: hooksGeneral.podLabels appears in pod template
    set:
      hooksGeneral:
        podLabels:
          team: devops
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.metadata.labels.team
          value: devops

  - it: hooksGeneral.podAnnotations appears in pod template
    set:
      hooksGeneral:
        podAnnotations:
          hook-owner: devops-team
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.metadata.annotations.hook-owner
          value: devops-team

  - it: minimal hook does not render empty labels or annotations in pod template
    set:
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - notExists:
          path: spec.template.metadata.labels
      - notExists:
          path: spec.template.metadata.annotations

  - it: renders backoffLimit zero
    set:
      hooks:
        migration:
          backoffLimit: 0
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 0

  - it: renders parallelism zero
    set:
      hooks:
        migration:
          parallelism: 0
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.parallelism
          value: 0

  - it: default deletePolicy is before-hook-creation,hook-succeeded
    set:
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: "before-hook-creation,hook-succeeded"

  - it: hooksGeneral.deletePolicy overrides the default
    set:
      hooksGeneral:
        deletePolicy: before-hook-creation
      hooks:
        migration:
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation

  - it: instance deletePolicy overrides hooksGeneral
    set:
      hooksGeneral:
        deletePolicy: before-hook-creation
      hooks:
        migration:
          deletePolicy: hook-failed
          containers:
            - name: migrate
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: hook-failed
