suite: auto-checksum annotations
templates:
  - deployment.yaml
tests:
  - it: omits checksum annotations when no envConfigmaps or envSecrets
    set:
      deployments.api.image: nginx
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: adds configmap checksum for global envs reference
    set:
      envs:
        FOO: bar
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: adds secret checksum for global secretEnvs reference
    set:
      secretEnvs:
        DB_PASS: s3cret
      deployments:
        api:
          image: nginx
          envSecrets:
            - secret-envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/secret-secret-envs

  - it: adds checksum for named configMap
    set:
      configMaps:
        app-config:
          data:
            KEY: value
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - app-config
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-app-config

  - it: adds checksum for named secret
    set:
      secrets:
        api-keys:
          data:
            TOKEN: abc
      deployments:
        api:
          image: nginx
          envSecrets:
            - api-keys
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/secret-api-keys

  - it: adds multiple checksums for both configmap and secret
    set:
      envs:
        FOO: bar
      secretEnvs:
        DB_PASS: s3cret
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
          envSecrets:
            - secret-envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/secret-secret-envs

  - it: disables checksums via defaults.autoChecksum false
    set:
      envs:
        FOO: bar
      defaults:
        autoChecksum: false
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: disables checksums via per-instance autoChecksum false
    set:
      envs:
        FOO: bar
      deployments:
        api:
          image: nginx
          autoChecksum: false
          envConfigmaps:
            - envs
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: disables checksums via deploymentsGeneral.autoChecksum false
    set:
      envs:
        FOO: bar
      deploymentsGeneral:
        autoChecksum: false
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: per-instance autoChecksum overrides general false
    set:
      envs:
        FOO: bar
      deploymentsGeneral:
        autoChecksum: false
      deployments:
        api:
          image: nginx
          autoChecksum: true
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: inherits envConfigmaps from deploymentsGeneral
    set:
      envs:
        FOO: bar
      deploymentsGeneral:
        envConfigmaps:
          - envs
      deployments:
        api:
          image: nginx
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: checksum changes when configmap data changes
    set:
      envs:
        FOO: bar
        EXTRA: value
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: preserves podAnnotations alongside auto-checksums
    set:
      envs:
        FOO: bar
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
          podAnnotations:
            custom: annotation
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs
      - equal:
          path: spec.template.metadata.annotations.custom
          value: annotation

  - it: skips configmap checksum when global envs is empty but ref exists
    set:
      deployments:
        api:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - notExists:
          path: spec.template.metadata.annotations
---
suite: auto-checksum on cronjobs
templates:
  - cronjob.yaml
tests:
  - it: adds configmap checksum annotation on cronjob pod template
    set:
      envs:
        FOO: bar
      cronJobs:
        cleanup:
          schedule: "0 3 * * *"
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.jobTemplate.spec.template.metadata.annotations.checksum/configmap-envs

  - it: omits checksum when no refs on cronjob
    set:
      cronJobs:
        cleanup:
          schedule: "0 3 * * *"
          image: nginx
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.metadata
          value: {}
---
suite: auto-checksum on jobs
templates:
  - job.yaml
tests:
  - it: adds configmap checksum annotation on job pod template
    set:
      envs:
        FOO: bar
      jobs:
        seed:
          image: nginx
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: omits checksum when no refs on job
    set:
      jobs:
        seed:
          image: nginx
    asserts:
      - equal:
          path: spec.template.metadata
          value: {}
---
suite: auto-checksum on hooks
templates:
  - helm-hooks.yaml
tests:
  - it: adds configmap checksum annotation on hook pod template
    set:
      envs:
        FOO: bar
      hooks:
        migrate:
          containers:
            - image: nginx
              imageTag: "1.25"
          envConfigmaps:
            - envs
    asserts:
      - isNotEmpty:
          path: spec.template.metadata.annotations.checksum/configmap-envs

  - it: omits checksum annotation when no refs on hook
    set:
      hooks:
        migrate:
          containers:
            - image: nginx
              imageTag: "1.25"
    asserts:
      - notExists:
          path: spec.template.metadata.annotations.checksum/configmap-envs

---
suite: auto-checksum cherry-pick env refs
templates:
  - deployment.yaml
tests:
  - it: cherry-pick envsFromConfigmap pointing at chart-managed CM produces checksum
    release:
      name: myrel
    set:
      configMaps:
        app-config:
          data:
            KEY: value
      deployments:
        api:
          image: nginx
          envsFromConfigmap:
            KEY:
              name: myrel-app-config
              key: KEY
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations.checksum/configmap-app-config
          pattern: ^[a-f0-9]{64}$

  - it: cherry-pick envsFromSecret pointing at chart-managed Secret produces checksum
    release:
      name: myrel
    set:
      secrets:
        api-keys:
          data:
            TOKEN: abc
      deployments:
        api:
          image: nginx
          envsFromSecret:
            TOKEN:
              name: myrel-api-keys
              key: TOKEN
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations.checksum/secret-api-keys
          pattern: ^[a-f0-9]{64}$

  - it: cherry-pick envsFromConfigmap pointing at external CM does NOT produce chart checksum
    release:
      name: myrel
    set:
      configMaps:
        app-config:
          data:
            KEY: value
      deployments:
        api:
          image: nginx
          envsFromConfigmap:
            EXT_KEY:
              name: external-not-chart-managed
              key: KEY
    asserts:
      - notExists:
          path: spec.template.metadata.annotations.checksum/configmap-external-not-chart-managed
      - notExists:
          path: spec.template.metadata.annotations.checksum/configmap-app-config

  - it: cherry-pick on deploymentsGeneral propagates to all instances
    release:
      name: myrel
    set:
      configMaps:
        shared-config:
          data:
            KEY: v
      deploymentsGeneral:
        envsFromConfigmap:
          KEY:
            name: myrel-shared-config
            key: KEY
      deployments:
        api:
          image: nginx
    asserts:
      - matchRegex:
          path: spec.template.metadata.annotations.checksum/configmap-shared-config
          pattern: ^[a-f0-9]{64}$
