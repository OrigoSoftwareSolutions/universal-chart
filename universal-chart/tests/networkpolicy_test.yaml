suite: networkpolicy template
templates:
  - networkpolicies.yaml
tests:
  - it: renders a networkpolicy with kind apiVersion name and namespace
    set:
      networkPolicies:
        deny-all:
          spec:
            podSelector:
              matchLabels:
                app: my-app
            policyTypes:
              - Ingress
              - Egress
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: apiVersion
          value: networking.k8s.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -deny-all$
      - isNotEmpty:
          path: metadata.namespace
      - equal:
          path: spec.policyTypes[0]
          value: Ingress
      - equal:
          path: spec.policyTypes[1]
          value: Egress

  - it: passes spec through verbatim
    set:
      networkPolicies:
        allow-specific:
          spec:
            podSelector:
              matchLabels:
                app: frontend
            ingress:
              - from:
                  - ipBlock:
                      cidr: 10.0.0.0/8
                ports:
                  - port: "8080"
                    protocol: TCP
            policyTypes:
              - Ingress
    asserts:
      - equal:
          path: spec.podSelector.matchLabels
          value:
            app: frontend
      - equal:
          path: spec.ingress[0].from[0].ipBlock.cidr
          value: 10.0.0.0/8
      - equal:
          path: spec.ingress[0].ports[0].port
          value: "8080"

  - it: supports custom name override
    set:
      networkPolicies:
        custom-np:
          name: my-custom-policy
          spec:
            podSelector:
              matchLabels:
                app: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-policy

  - it: renders labels and annotations
    set:
      networkPolicies:
        labelled:
          spec:
            podSelector:
              matchLabels:
                app: my-app
            policyTypes:
              - Ingress
          labels:
            team: platform
          annotations:
            example.com/network-policy: "true"
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.annotations["example.com/network-policy"]
          value: "true"

  - it: disabled suppresses rendering
    set:
      networkPolicies:
        disabled-np:
          disabled: true
          spec:
            podSelector:
              matchLabels:
                app: my-app
    asserts:
      - hasDocuments:
          count: 0
  - it: renders egress rules with namespaceSelector and podSelector
    set:
      networkPolicies:
        egress-np:
          spec:
            podSelector: {}
            egress:
              - to:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: database
                    podSelector:
                      matchLabels:
                        app: db
                ports:
                  - port: "5432"
                    protocol: TCP
            policyTypes:
              - Egress
    asserts:
      - equal:
          path: spec.podSelector
          value: {}
      - equal:
          path: spec.policyTypes[0]
          value: Egress
      - equal:
          path: spec.egress[0].to[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: database
      - equal:
          path: spec.egress[0].to[0].podSelector.matchLabels.app
          value: db
      - equal:
          path: spec.egress[0].ports[0].port
          value: "5432"

  - it: renders empty podSelector (match all pods)
    set:
      networkPolicies:
        match-all:
          spec:
            podSelector: {}
            policyTypes:
              - Ingress
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.podSelector
          value: {}
      - equal:
          path: spec.policyTypes[0]
          value: Ingress

  - it: renders namespaceSelector and podSelector combination ingress
    set:
      networkPolicies:
        cross-ns:
          spec:
            podSelector:
              matchLabels:
                app: api
            ingress:
              - from:
                  - namespaceSelector:
                      matchLabels:
                        kubernetes.io/metadata.name: monitoring
                    podSelector:
                      matchLabels:
                        app: prometheus
            policyTypes:
              - Ingress
    asserts:
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: monitoring
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels.app
          value: prometheus
      - equal:
          path: spec.podSelector.matchLabels.app
          value: api

  - it: renders endPort in port definitions
    set:
      networkPolicies:
        endport-np:
          spec:
            podSelector:
              matchLabels:
                app: my-app
            ingress:
              - from:
                  - ipBlock:
                      cidr: 10.0.0.0/8
                ports:
                  - port: "8080"
                    protocol: TCP
                    endPort: 8099
            policyTypes:
              - Ingress
    asserts:
      - equal:
          path: spec.ingress[0].ports[0].endPort
          value: 8099

  - it: renders matchExpressions in podSelector
    set:
      networkPolicies:
        mexpr-np:
          spec:
            podSelector:
              matchExpressions:
                - key: tier
                  operator: In
                  values:
                    - frontend
                    - api
            policyTypes:
              - Ingress
    asserts:
      - equal:
          path: spec.podSelector.matchExpressions[0].key
          value: tier
      - equal:
          path: spec.podSelector.matchExpressions[0].operator
          value: In
      - equal:
          path: spec.podSelector.matchExpressions[0].values[0]
          value: frontend
      - equal:
          path: spec.podSelector.matchExpressions[0].values[1]
          value: api

  - it: renders multiple ingress and egress rules
    set:
      networkPolicies:
        multi-np:
          spec:
            podSelector: {}
            ingress:
              - from:
                  - ipBlock:
                      cidr: 10.0.0.0/8
                ports:
                  - port: "80"
              - from:
                  - namespaceSelector: {}
                ports:
                  - port: "443"
            egress:
              - to:
                  - ipBlock:
                      cidr: 0.0.0.0/0
                    except:
                      - 10.0.0.0/8
              - to:
                  - podSelector:
                      matchLabels:
                        app: dns
                ports:
                  - port: "53"
                    protocol: UDP
            policyTypes:
              - Ingress
              - Egress
    asserts:
      - equal:
          path: spec.ingress[0].from[0].ipBlock.cidr
          value: 10.0.0.0/8
      - equal:
          path: spec.ingress[0].ports[0].port
          value: "80"
      - equal:
          path: spec.ingress[1].from[0].namespaceSelector
          value: {}
      - equal:
          path: spec.ingress[1].ports[0].port
          value: "443"
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 0.0.0.0/0
      - equal:
          path: spec.egress[1].to[0].podSelector.matchLabels.app
          value: dns
      - equal:
          path: spec.egress[1].ports[0].port
          value: "53"

  - it: suppresses annotations block when no annotations set
    set:
      networkPolicies:
        no-annots:
          spec:
            podSelector:
              matchLabels:
                app: my-app
    asserts:
      - notExists:
          path: metadata.annotations
      - equal:
          path: spec.podSelector.matchLabels.app
          value: my-app
