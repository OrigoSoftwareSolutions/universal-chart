suite: job
templates:
  - job.yaml
tests:
  - it: renders a Job with correct kind and apiVersion
    set:
      jobs:
        refresh:
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - isKind:
          of: Job
      - equal:
          path: apiVersion
          value: batch/v1
      - matchRegex:
          path: metadata.name
          pattern: -refresh$
      - isNotEmpty:
          path: metadata.namespace

  - it: respects the disabled flag
    set:
      jobs:
        refresh:
          disabled: true
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 0

  - it: renders PrometheusRule with release namespace
    set:
      jobs:
        refresh:
          commandDurationAlert: 30
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1
      - isNotEmpty:
          path: metadata.namespace
        documentIndex: 1

  - it: jobsGeneral.podLabels appears in pod template
    set:
      jobsGeneral:
        podLabels:
          team: data
      jobs:
        refresh:
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.metadata.labels.team
          value: data

  - it: jobsGeneral.podAnnotations appears in pod template
    set:
      jobsGeneral:
        podAnnotations:
          batch-owner: data-team
      jobs:
        refresh:
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.metadata.annotations.batch-owner
          value: data-team

  - it: renders backoffLimit zero
    set:
      jobs:
        refresh:
          backoffLimit: 0
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 0

  - it: renders ttlSecondsAfterFinished zero
    set:
      jobs:
        refresh:
          ttlSecondsAfterFinished: 0
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 0

  - it: renders parallelism zero
    set:
      jobs:
        refresh:
          parallelism: 0
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.parallelism
          value: 0

  - it: renders PrometheusRule when commandDurationAlert is zero
    set:
      jobs:
        refresh:
          commandDurationAlert: 0
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1

  # ── restartPolicy general-tier cascade ────────────────────────────
  - it: jobsGeneral.restartPolicy overrides default Never
    set:
      jobsGeneral:
        restartPolicy: OnFailure
      jobs:
        refresh:
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure

  - it: instance restartPolicy overrides jobsGeneral
    set:
      jobsGeneral:
        restartPolicy: OnFailure
      jobs:
        refresh:
          restartPolicy: Never
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - equal:
          path: spec.template.spec.restartPolicy
          value: Never

  # ── commandDurationAlert general-tier cascade ─────────────────────
  - it: jobsGeneral.commandDurationAlert renders PrometheusRule with general value
    set:
      jobsGeneral:
        commandDurationAlert: 600
      jobs:
        refresh:
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: PrometheusRule
        documentIndex: 1
      - matchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: "> 600"
        documentIndex: 1
      - matchRegex:
          path: spec.groups[0].rules[0].annotations.message
          pattern: "more than 600"
        documentIndex: 1

  - it: instance commandDurationAlert overrides jobsGeneral
    set:
      jobsGeneral:
        commandDurationAlert: 600
      jobs:
        refresh:
          commandDurationAlert: 1800
          containers:
            - name: refresh
              image: myapp
              imageTag: "1.0"
    asserts:
      - hasDocuments:
          count: 2
      - matchRegex:
          path: spec.groups[0].rules[0].expr
          pattern: "> 1800"
        documentIndex: 1

  - it: commandDurationAlertLabels overrides PrometheusRule metadata.labels for jobs
    set:
      jobs:
        etl:
          image: nginx
          commandDurationAlert: 1800
          commandDurationAlertLabels:
            release: kps
    asserts:
      - documentIndex: 1
        equal:
          path: kind
          value: PrometheusRule
      - documentIndex: 1
        equal:
          path: metadata.labels.release
          value: kps
      - documentIndex: 1
        notExists:
          path: metadata.labels.prometheus

  - it: jobsGeneral commandDurationAlertRuleLabels propagates to all jobs
    set:
      jobsGeneral:
        commandDurationAlertRuleLabels:
          severity: critical
          team: data
      jobs:
        etl:
          image: nginx
          commandDurationAlert: 1800
    asserts:
      - documentIndex: 1
        equal:
          path: spec.groups[0].rules[0].labels.severity
          value: critical
      - documentIndex: 1
        equal:
          path: spec.groups[0].rules[0].labels.team
          value: data
