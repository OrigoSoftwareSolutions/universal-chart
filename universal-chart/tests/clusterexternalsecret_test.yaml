suite: clusterexternalsecret template
templates:
  - clusterexternalsecrets.yaml
tests:
  - it: renders a clusterexternalsecret with api version name and no namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterExternalSecrets.my-ces.spec.refreshTime: 1h
      clusterExternalSecrets.my-ces.spec.externalSecretSpec.refreshInterval: 1h
    asserts:
      - isKind:
          of: ClusterExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-ces$
      - notExists:
          path: metadata.namespace
  - it: omits clusterexternalsecret documents when disabled
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterExternalSecrets.my-ces.disabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: passes clusterexternalsecret spec through
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterExternalSecrets.my-ces.spec.refreshTime: 1h
      clusterExternalSecrets.my-ces.spec.externalSecretSpec.refreshInterval: 1h
    asserts:
      - equal:
          path: spec.externalSecretSpec.refreshInterval
          value: 1h
