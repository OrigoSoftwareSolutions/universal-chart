suite: istiovirtualservice template
templates:
  - istiovirtualservice.yaml
tests:
  - it: renders a virtualservice with correct kind apiversion and namespace
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    values:
      - values/istiovirtualservice.yaml
    asserts:
      - isKind:
          of: VirtualService
      - equal:
          path: apiVersion
          value: networking.istio.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-vs$
      - isNotEmpty:
          path: metadata.namespace
  - it: omits virtualservice documents when disabled
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    set:
      istioVirtualServices.my-vs.disabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: renders hosts and gateways as quoted arrays
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    values:
      - values/istiovirtualservice.yaml
    asserts:
      - contains:
          path: spec.hosts
          content: example.com
      - contains:
          path: spec.hosts
          content: www.example.com
      - contains:
          path: spec.gateways
          content: my-gw
      - contains:
          path: spec.gateways
          content: mesh
  - it: renders http routes with match and destination
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    values:
      - values/istiovirtualservice_http.yaml
    asserts:
      - equal:
          path: spec.http[0].name
          value: default
      - equal:
          path: spec.http[0].match[0].uri.prefix
          value: /
      - equal:
          path: spec.http[0].route[0].destination.host
          value: my-svc
      - equal:
          path: spec.http[0].route[0].destination.port.number
          value: 8080

  - it: omits http route name when not set (M3 fix)
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    set:
      istioVirtualServices:
        my-vs:
          hosts:
            - example.com
          gateways:
            - my-gw
          http:
            - route:
                - destination:
                    host: my-svc
                    port:
                      number: 8080
    asserts:
      - notExists:
          path: spec.http[0].name

  - it: renders tplvalues expressions in hosts and gateways
    capabilities:
      apiVersions:
        - networking.istio.io/v1
    set:
      istioVirtualServices:
        my-vs:
          hosts:
            - '{{ .Release.Name }}.example.com'
          gateways:
            - '{{ .Release.Name }}-gw'
          http:
            - route:
                - destination:
                    host: my-svc
                    port:
                      number: 8080
    asserts:
      - contains:
          path: spec.hosts
          content: RELEASE-NAME.example.com
      - contains:
          path: spec.gateways
          content: RELEASE-NAME-gw
