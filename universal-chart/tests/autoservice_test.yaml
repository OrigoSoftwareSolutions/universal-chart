suite: auto-service generation
templates:
  - autoservices.yaml

tests:
  - it: ports map auto-generates a ClusterIP Service
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: service false suppresses auto-generated Service
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service: false
    asserts:
      - hasDocuments:
          count: 0

  - it: service type override applies to auto-generated Service
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: auto-service renders externalTrafficPolicy override
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
      deployments.api.service.externalTrafficPolicy: Local
    asserts:
      - equal:
          path: spec.externalTrafficPolicy
          value: Local

  - it: auto-service renders loadBalancerSourceRanges override
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
      deployments.api.service.loadBalancerSourceRanges:
        - 10.0.0.0/8
        - 192.168.0.0/16
    asserts:
      - equal:
          path: spec.loadBalancerSourceRanges[0]
          value: 10.0.0.0/8
      - equal:
          path: spec.loadBalancerSourceRanges[1]
          value: 192.168.0.0/16

  - it: no ports at workload level produces no auto-service
    set:
      deployments.api.image: myapp:1.0
    asserts:
      - hasDocuments:
          count: 0

  - it: statefulset with ports auto-generates a Service
    set:
      statefulSets.db.image: postgres:15
      statefulSets.db.ports.postgres: 5432
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: postgres
            port: 5432
            targetPort: postgres
            protocol: TCP

  - it: daemonset with ports auto-generates a Service
    set:
      daemonSets.agent.image: datadog/agent:7
      daemonSets.agent.ports.metrics: 8125
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 8125
            targetPort: metrics
            protocol: TCP

  - it: includes defaults.annotations on auto-generated service
    set:
      defaults:
        annotations:
          global: from-defaults
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults

  - it: merges defaults.annotations with service annotations
    set:
      defaults:
        annotations:
          global: from-defaults
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.annotations.svc: from-service
    asserts:
      - equal:
          path: metadata.annotations.global
          value: from-defaults
      - equal:
          path: metadata.annotations.svc
          value: from-service

  - it: auto-service selector includes component label matching workload name
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: api

  - it: statefulset auto-service selector includes component label
    set:
      statefulSets.db.image: postgres:15
      statefulSets.db.ports.postgres: 5432
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: db

  - it: daemonset auto-service selector includes component label
    set:
      daemonSets.agent.image: datadog/agent:7
      daemonSets.agent.ports.metrics: 8125
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: agent

  - it: two workloads produce auto-services with different component selectors
    set:
      deployments:
        api:
          image: myapp:1.0
          ports:
            http: 8080
        worker:
          image: myapp:1.0
          ports:
            http: 9090
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: api
        documentIndex: 0
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: worker
        documentIndex: 1

  - it: allocateLoadBalancerNodePorts true renders in spec
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
      deployments.api.service.allocateLoadBalancerNodePorts: true
    asserts:
      - equal:
          path: spec.allocateLoadBalancerNodePorts
          value: true

  - it: allocateLoadBalancerNodePorts false renders in spec
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
      deployments.api.service.allocateLoadBalancerNodePorts: false
    asserts:
      - equal:
          path: spec.allocateLoadBalancerNodePorts
          value: false

  - it: allocateLoadBalancerNodePorts is absent when not set
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.type: LoadBalancer
    asserts:
      - notExists:
          path: spec.allocateLoadBalancerNodePorts

  - it: publishNotReadyAddresses false is rendered not silently dropped
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.publishNotReadyAddresses: false
    asserts:
      - equal:
          path: spec.publishNotReadyAddresses
          value: false

  - it: publishNotReadyAddresses true is rendered
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
      deployments.api.service.publishNotReadyAddresses: true
    asserts:
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: publishNotReadyAddresses is absent when not set
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports.http: 8080
    asserts:
      - notExists:
          path: spec.publishNotReadyAddresses

  - it: ports map extended form renders custom protocol on auto-service
    set:
      deployments.dns.image: coredns:1.11
      deployments.dns.ports:
        dns:
          port: 53
          protocol: UDP
    asserts:
      - contains:
          path: spec.ports
          content:
            name: dns
            port: 53
            targetPort: dns
            protocol: UDP

  - it: ports map mixed simple and extended form renders correctly
    set:
      deployments.dns.image: coredns:1.11
      deployments.dns.ports:
        dns:
          port: 53
          protocol: UDP
        http: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: dns
            port: 53
            targetPort: dns
            protocol: UDP
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP

  - it: ports map extended form without protocol defaults to TCP
    set:
      deployments.api.image: myapp:1.0
      deployments.api.ports:
        http:
          port: 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 8080
            targetPort: http
            protocol: TCP
