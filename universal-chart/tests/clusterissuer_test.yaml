suite: clusterissuer
templates:
  - clusterissuers.yaml
tests:
  - it: renders a ClusterIssuer without namespace
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
      clusterIssuers.letsencrypt.spec.acme.email: admin@example.com
    asserts:
      - isKind:
          of: ClusterIssuer
      - equal:
          path: apiVersion
          value: cert-manager.io/v1
      - notExists:
          path: metadata.namespace

  - it: falls back to v1alpha2 without cert-manager v1
    set:
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
    asserts:
      - equal:
          path: apiVersion
          value: cert-manager.io/v1alpha2

  - it: renders full chart labels
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: renders annotations through tplvalues.render
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      clusterIssuers.letsencrypt.annotations.release: "{{ .Release.Name }}"
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
    asserts:
      - equal:
          path: metadata.annotations.release
          value: RELEASE-NAME

  - it: renders spec through tplvalues.render
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
      clusterIssuers.letsencrypt.spec.acme.email: "admin@{{ .Release.Name }}.example.com"
    asserts:
      - equal:
          path: spec.acme.email
          value: admin@RELEASE-NAME.example.com

  - it: renders instance labels on metadata
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      clusterIssuers.letsencrypt.labels.team: platform
      clusterIssuers.letsencrypt.spec.acme.server: https://acme-v02.api.letsencrypt.org/directory
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            team: platform
