suite: bugfix regressions
templates:
  - deployment.yml
tests:
  # ── Fix #1: diagnosticMode suppresses all probes ─────────────────────────
  - it: diagnosticMode suppresses healthCheck shorthand probes
    set:
      diagnosticMode.enabled: true
      deployments.api.image: myapp:1.0
      deployments.api.healthCheck.path: /healthz
      deployments.api.healthCheck.port: 8080
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe

  - it: diagnosticMode suppresses explicit probes
    values:
      - values/diagnostic_probes.yaml
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].livenessProbe

  - it: diagnosticMode still overrides command and args
    set:
      diagnosticMode.enabled: true
      deployments.api.image: myapp:1.0
      deployments.api.healthCheck.path: /healthz
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value:
            - sleep
      - equal:
          path: spec.template.spec.containers[0].args
          value:
            - infinity

  - it: probes render normally when diagnosticMode is disabled
    set:
      diagnosticMode.enabled: false
      deployments.api.image: myapp:1.0
      deployments.api.healthCheck.path: /healthz
      deployments.api.healthCheck.port: 8080
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz

  # ── Fix #2: shorthand image goes through tplvalues.render ────────────────
  - it: shorthand image renders template expressions
    set:
      deployments.api.image: "{{ .Release.Name }}-app"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^.*-app$"

  # ── Fix #3: deterministic container names without randAlphaNum ────────────
  - it: nameless container gets deterministic index-based name
    values:
      - values/nameless_container.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: web-0

  - it: named container keeps its explicit name
    values:
      - values/named_container.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: my-nginx

  - it: multiple nameless containers get sequential indices
    values:
      - values/multi_nameless_containers.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: web-0
      - equal:
          path: spec.template.spec.containers[1].name
          value: web-1

  # ── Fix #4: releasePrefix uses trimSuffix consistently ───────────────────
  - it: releasePrefix applies consistently with trimSuffix
    set:
      releasePrefix: "myprefix"
      deployments.api.image: myapp:1.0
    asserts:
      - equal:
          path: metadata.name
          value: myprefix-api
