suite: externalsecret
templates:
  - externalsecrets.yaml
tests:
  - it: renders an ExternalSecret with namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
      externalSecrets.my-secret.spec.secretStoreRef.kind: SecretStore
      externalSecrets.my-secret.spec.target.name: my-secret
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - isNotEmpty:
          path: metadata.namespace
      - equal:
          path: spec.secretStoreRef.name
          value: azure-store

  - it: falls back to v1beta1 without ESO v1
    set:
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
    asserts:
      - equal:
          path: apiVersion
          value: external-secrets.io/v1beta1

  - it: renders full chart labels
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: includes defaults.annotations
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      defaults.annotations.team: platform
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: renders annotations through tplvalues.render
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.annotations.release: "{{ .Release.Name }}"
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
    asserts:
      - equal:
          path: metadata.annotations.release
          value: RELEASE-NAME

  - it: renders spec through tplvalues.render
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
      externalSecrets.my-secret.spec.target.name: "{{ .Release.Name }}-secret"
    asserts:
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-secret

  - it: skips rendering when disabled is true
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.disabled: true
      externalSecrets.my-secret.spec.refreshInterval: 1h
    asserts:
      - hasDocuments:
          count: 0

  - it: renders instance labels on metadata
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      externalSecrets.my-secret.labels.team: platform
      externalSecrets.my-secret.spec.refreshInterval: 1h
      externalSecrets.my-secret.spec.secretStoreRef.name: azure-store
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            team: platform
