suite: externalsecrets template
templates:
  - externalsecrets.yaml
tests:
  - it: renders an externalsecret with correct apiVersion and namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1beta1
    set:
      externalSecrets.my-es.spec.refreshInterval: 1h
      externalSecrets.my-es.spec.secretStoreRef.name: my-store
      externalSecrets.my-es.spec.secretStoreRef.kind: SecretStore
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1beta1
      - matchRegex:
          path: metadata.name
          pattern: -my-es$
      - isNotEmpty:
          path: metadata.namespace

  - it: passes externalsecret spec through verbatim
    capabilities:
      apiVersions:
        - external-secrets.io/v1beta1
    set:
      externalSecrets.my-es.spec.refreshInterval: 1h
      externalSecrets.my-es.spec.secretStoreRef.name: my-store
      externalSecrets.my-es.spec.secretStoreRef.kind: SecretStore
    asserts:
      - equal:
          path: spec.refreshInterval
          value: 1h
      - equal:
          path: spec.secretStoreRef.name
          value: my-store

  - it: disabled entry renders no documents
    capabilities:
      apiVersions:
        - external-secrets.io/v1beta1
    set:
      externalSecrets.my-es.disabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: multiple entries render multiple documents
    capabilities:
      apiVersions:
        - external-secrets.io/v1beta1
    set:
      externalSecrets.es-one.spec.refreshInterval: 1h
      externalSecrets.es-two.spec.refreshInterval: 30m
    asserts:
      - hasDocuments:
          count: 2

  - it: optional name field overrides default naming
    capabilities:
      apiVersions:
        - external-secrets.io/v1beta1
    set:
      externalSecrets.my-es.name: my-custom-name
      externalSecrets.my-es.spec.refreshInterval: 1h
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-name
