suite: issuer template
templates:
  - issuer.yaml
tests:
  - it: renders an issuer when cert-manager is available
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      issuers.my-issuer.acme.server: https://acme-v02.api.letsencrypt.org/directory
      issuers.my-issuer.acme.email: admin@example.com
      issuers.my-issuer.acme.privateKeySecretRef.name: letsencrypt-key
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: apiVersion
          value: cert-manager.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-issuer$
      - isNotEmpty:
          path: metadata.namespace
      - equal:
          path: spec.acme.server
          value: https://acme-v02.api.letsencrypt.org/directory
      - equal:
          path: spec.acme.email
          value: admin@example.com
      - equal:
          path: spec.acme.privateKeySecretRef.name
          value: letsencrypt-key

  - it: renders a clusterissuer when kind is set to clusterissuer
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      issuers.my-issuer.kind: ClusterIssuer
      issuers.my-issuer.acme.server: https://acme-v02.api.letsencrypt.org/directory
      issuers.my-issuer.acme.email: admin@example.com
      issuers.my-issuer.acme.privateKeySecretRef.name: letsencrypt-key
    asserts:
      - isKind:
          of: ClusterIssuer
      - matchRegex:
          path: metadata.name
          pattern: -my-issuer$
      - notExists:
          path: metadata.namespace

  - it: falls back to v1alpha2 without cert-manager v1
    set:
      issuers.my-issuer.acme.server: https://acme-v02.api.letsencrypt.org/directory
      issuers.my-issuer.acme.email: admin@example.com
      issuers.my-issuer.acme.privateKeySecretRef.name: letsencrypt-key
    asserts:
      - isKind:
          of: Issuer
      - equal:
          path: apiVersion
          value: cert-manager.io/v1alpha2

  - it: renders acme spec correctly
    capabilities:
      apiVersions:
        - cert-manager.io/v1
    set:
      issuers.my-issuer.acme.server: https://acme-v02.api.letsencrypt.org/directory
      issuers.my-issuer.acme.email: admin@example.com
      issuers.my-issuer.acme.privateKeySecretRef.name: letsencrypt-key
    asserts:
      - equal:
          path: spec.acme.server
          value: https://acme-v02.api.letsencrypt.org/directory
      - equal:
          path: spec.acme.email
          value: admin@example.com
      - equal:
          path: spec.acme.privateKeySecretRef.name
          value: letsencrypt-key

