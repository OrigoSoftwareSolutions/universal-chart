suite: statefulset
templates:
  - statefulset.yaml
tests:
  - it: renders a StatefulSet with correct kind and apiVersion
    set:
      statefulSets:
        db:
          containers:
            - name: db
              image: postgres
              imageTag: "16"
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: apiVersion
          value: apps/v1
      - matchRegex:
          path: metadata.name
          pattern: -db$
      - isNotEmpty:
          path: metadata.namespace

  - it: respects the disabled flag
    set:
      statefulSets:
        db:
          disabled: true
          containers:
            - name: db
              image: postgres
              imageTag: "16"
    asserts:
      - hasDocuments:
          count: 0

  - it: merges statefulSetsGeneral annotations into metadata
    set:
      statefulSetsGeneral:
        annotations:
          note: from-general
      statefulSets:
        db:
          containers:
            - name: db
              image: postgres
              imageTag: "16"
    asserts:
      - equal:
          path: metadata.annotations.note
          value: from-general

  - it: merges statefulSetsGeneral pod metadata into template metadata
    set:
      statefulSetsGeneral:
        podLabels:
          tier: data
        podAnnotations:
          checksum/config: abc123
      statefulSets:
        db:
          containers:
            - name: db
              image: postgres
              imageTag: "16"
    asserts:
      - equal:
          path: spec.template.metadata.labels.tier
          value: data
      - equal:
          path: spec.template.metadata.annotations.checksum/config
          value: abc123

  - it: renders updateStrategy instead of strategy
    set:
      statefulSets:
        db:
          updateStrategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 1
          containers:
            - name: db
              image: postgres
              imageTag: "16"
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate
      - notExists:
          path: spec.strategy

  - it: adds app.kubernetes.io/component label to statefulset matchLabels and pod labels
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: db
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: db

  - it: defaults serviceName to the statefulset name when not specified
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
    asserts:
      - matchRegex:
          path: spec.serviceName
          pattern: -db$

  - it: uses explicit serviceName when specified
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          serviceName: my-custom-svc
    asserts:
      - matchRegex:
          path: spec.serviceName
          pattern: -my-custom-svc$

  - it: uses defaults.revisionHistoryLimit when neither instance nor general set it
    set:
      defaults.revisionHistoryLimit: 3
      statefulSets.db.image: postgres
      statefulSets.db.imageTag: "16"
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: defaults.revisionHistoryLimit is overridden by statefulSetsGeneral
    set:
      defaults.revisionHistoryLimit: 3
      statefulSetsGeneral.revisionHistoryLimit: 7
      statefulSets.db.image: postgres
      statefulSets.db.imageTag: "16"
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 7

  - it: sets revisionHistoryLimit from instance
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: inherits revisionHistoryLimit from statefulSetsGeneral
    set:
      statefulSetsGeneral:
        revisionHistoryLimit: 3
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 3

  - it: instance revisionHistoryLimit overrides statefulSetsGeneral
    set:
      statefulSetsGeneral:
        revisionHistoryLimit: 3
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          revisionHistoryLimit: 10
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 10

  - it: revisionHistoryLimit 0 is rendered not silently dropped
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          revisionHistoryLimit: 0
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: minReadySeconds 0 is rendered not silently dropped
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          minReadySeconds: 0
    asserts:
      - equal:
          path: spec.minReadySeconds
          value: 0

  - it: replicas zero renders correctly
    set:
      statefulSets:
        db:
          image: postgres
          imageTag: "16"
          replicas: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 0

  - it: serviceName honors releasePrefix and matches metadata.name by default
    release:
      name: myrel
    set:
      releasePrefix: corp
      statefulSets:
        pg:
          image: postgres
          imageTag: "16"
    asserts:
      - equal:
          path: metadata.name
          value: corp-pg
      - equal:
          path: spec.serviceName
          value: corp-pg

  - it: explicit serviceName is also prefixed to match auto-prefixed Services
    release:
      name: myrel
    set:
      releasePrefix: corp
      statefulSets:
        pg:
          image: postgres
          imageTag: "16"
          serviceName: pg-headless
    asserts:
      - equal:
          path: spec.serviceName
          value: corp-pg-headless
