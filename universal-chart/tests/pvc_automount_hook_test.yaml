suite: pvc auto-mount excluded from hooks
templates:
  - helm-hooks.yml
tests:
  - it: does not add PVC volumes to hook pods
    values:
      - values/pvc_automount_hook.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: app-data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-app-data
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: app-data
            mountPath: /data
