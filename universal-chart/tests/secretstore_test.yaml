suite: secretstore template
templates:
  - secretstores.yaml
tests:
  - it: renders a secretstore with api version name and namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      secretStores.my-store.spec.provider.aws.service: SecretsManager
      secretStores.my-store.spec.provider.aws.region: us-east-1
    asserts:
      - isKind:
          of: SecretStore
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-store$
      - isNotEmpty:
          path: metadata.namespace
  - it: omits secretstore documents when disabled
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      secretStores.my-store.disabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: passes secretstore spec through
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      secretStores.my-store.spec.provider.aws.service: SecretsManager
      secretStores.my-store.spec.provider.aws.region: us-east-1
    asserts:
      - equal:
          path: spec.provider.aws.region
          value: us-east-1
