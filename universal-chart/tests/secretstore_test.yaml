suite: secretstore template
templates:
  - secretstores.yaml
tests:
  - it: renders a secretstore with api version name and namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      secretStores.my-store.spec.provider.azurekv.vaultUrl: "https://my-vault.vault.azure.net"
      secretStores.my-store.spec.provider.azurekv.authType: WorkloadIdentity
    asserts:
      - isKind:
          of: SecretStore
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -my-store$
      - isNotEmpty:
          path: metadata.namespace
  - it: passes secretstore spec through
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      secretStores.my-store.spec.provider.azurekv.vaultUrl: "https://my-vault.vault.azure.net"
      secretStores.my-store.spec.provider.azurekv.authType: WorkloadIdentity
    asserts:
      - equal:
          path: spec.provider.azurekv.authType
          value: WorkloadIdentity
