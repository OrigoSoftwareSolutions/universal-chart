suite: httproute
templates:
  - httproutes.yaml
tests:
  - it: renders an HTTPRoute with correct apiVersion
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1
    set:
      httpRoutes.my-route.spec.parentRefs[0].name: gateway
      httpRoutes.my-route.spec.rules[0].matches[0].path.type: PathPrefix
      httpRoutes.my-route.spec.rules[0].matches[0].path.value: /
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - isNotEmpty:
          path: metadata.namespace

  - it: falls back to v1beta1 without gateway API
    set:
      httpRoutes.my-route.spec.parentRefs[0].name: gateway
    asserts:
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1beta1

  - it: renders full chart labels including helm.sh/chart
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1
    set:
      httpRoutes.my-route.spec.parentRefs[0].name: gateway
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - isNotEmpty:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: renders annotations through tplvalues.render
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1
    set:
      httpRoutes.my-route.annotations.release: "{{ .Release.Name }}"
      httpRoutes.my-route.spec.parentRefs[0].name: gateway
    asserts:
      - equal:
          path: metadata.annotations.release
          value: RELEASE-NAME

  - it: renders spec through tplvalues.render
    capabilities:
      apiVersions:
        - gateway.networking.k8s.io/v1
    set:
      httpRoutes.my-route.spec.parentRefs[0].name: gateway
      httpRoutes.my-route.spec.hostnames[0]: "{{ .Release.Name }}.example.com"
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: RELEASE-NAME.example.com

