suite: serviceaccount
templates:
  - serviceaccount.yml
tests:
  - it: renders a ServiceAccount with correct kind and apiVersion
    set:
      serviceAccount:
        deployer: {}
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1
      - matchRegex:
          path: metadata.name
          pattern: -deployer$
      - isNotEmpty:
          path: metadata.namespace
