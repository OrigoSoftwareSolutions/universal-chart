suite: serviceaccount
templates:
  - serviceaccount.yml
tests:
  - it: renders a ServiceAccount with correct kind and apiVersion
    set:
      serviceAccount:
        deployer: {}
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: apiVersion
          value: v1
      - matchRegex:
          path: metadata.name
          pattern: -deployer$
      - isNotEmpty:
          path: metadata.namespace

  - it: renders no documents when serviceAccount is unset
    asserts:
      - hasDocuments:
          count: 0

  - it: merges serviceAccountGeneral labels into ServiceAccount
    set:
      serviceAccountGeneral:
        labels:
          team: platform
      serviceAccount:
        deployer: {}
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.labels.team
          value: platform

  - it: instance labels are rendered alongside general labels
    set:
      serviceAccountGeneral:
        labels:
          team: platform
      serviceAccount:
        deployer:
          labels:
            env: production
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.labels.team
          value: platform
      - equal:
          path: metadata.labels.env
          value: production

  - it: creates Role + RoleBinding when role has rules
    set:
      serviceAccount:
        deployer:
          role:
            name: deployer-role
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - hasDocuments:
          count: 3

  - it: Role has correct kind and rules when role.rules is set
    documentIndex: 1
    set:
      serviceAccount:
        deployer:
          role:
            name: deployer-role
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - isKind:
          of: Role
      - isNotEmpty:
          path: rules

  - it: RoleBinding references Role and ServiceAccount when role.rules is set
    documentIndex: 2
    set:
      serviceAccount:
        deployer:
          role:
            name: deployer-role
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get", "list"]
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - matchRegex:
          path: roleRef.name
          pattern: -deployer-role$
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
      - matchRegex:
          path: subjects[0].name
          pattern: -deployer$

  - it: creates only RoleBinding when role has name but no rules
    set:
      serviceAccount:
        deployer:
          role:
            name: existing-role
    asserts:
      - hasDocuments:
          count: 2

  - it: RoleBinding references existing role name directly when no rules
    documentIndex: 1
    set:
      serviceAccount:
        deployer:
          role:
            name: existing-role
    asserts:
      - isKind:
          of: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: existing-role

  - it: creates ClusterRole + ClusterRoleBinding when clusterRole has rules
    set:
      serviceAccount:
        deployer:
          clusterRole:
            name: deployer-cr
            rules:
              - apiGroups: [""]
                resources: ["nodes"]
                verbs: ["get"]
    asserts:
      - hasDocuments:
          count: 3

  - it: ClusterRole has correct kind and no namespace
    documentIndex: 1
    set:
      serviceAccount:
        deployer:
          clusterRole:
            name: deployer-cr
            rules:
              - apiGroups: [""]
                resources: ["nodes"]
                verbs: ["get"]
    asserts:
      - isKind:
          of: ClusterRole
      - notExists:
          path: metadata.namespace

  - it: ClusterRoleBinding references ClusterRole and ServiceAccount
    documentIndex: 2
    set:
      serviceAccount:
        deployer:
          clusterRole:
            name: deployer-cr
            rules:
              - apiGroups: [""]
                resources: ["nodes"]
                verbs: ["get"]
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - matchRegex:
          path: roleRef.name
          pattern: -deployer-cr$
      - equal:
          path: subjects[0].kind
          value: ServiceAccount

  - it: creates only ClusterRoleBinding when clusterRole has name but no rules
    set:
      serviceAccount:
        deployer:
          clusterRole:
            name: existing-cr
    asserts:
      - hasDocuments:
          count: 2

  - it: ClusterRoleBinding references existing clusterRole name directly when no rules
    documentIndex: 1
    set:
      serviceAccount:
        deployer:
          clusterRole:
            name: existing-cr
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: existing-cr

  - it: creates 5 documents when both role and clusterRole have rules
    set:
      serviceAccount:
        deployer:
          role:
            name: my-role
            rules:
              - apiGroups: [""]
                resources: ["pods"]
                verbs: ["get"]
          clusterRole:
            name: my-cr
            rules:
              - apiGroups: [""]
                resources: ["nodes"]
                verbs: ["get"]
    asserts:
      - hasDocuments:
          count: 5

  - it: merges general annotations into ServiceAccount
    set:
      serviceAccountGeneral:
        annotations:
          note: from-general
      serviceAccount:
        deployer: {}
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations.note
          value: from-general

  - it: renders automountServiceAccountToken on the ServiceAccount root
    set:
      serviceAccount:
        deployer:
          automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: preserves false automountServiceAccountToken without falling back
    set:
      serviceAccountGeneral:
        automountServiceAccountToken: true
      serviceAccount:
        deployer:
          automountServiceAccountToken: false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: renders imagePullSecrets on the ServiceAccount root
    set:
      serviceAccount:
        deployer:
          imagePullSecrets:
            - name: regcred
    asserts:
      - equal:
          path: imagePullSecrets[0].name
          value: regcred

  - it: renders secrets on the ServiceAccount root
    set:
      serviceAccount:
        deployer:
          secrets:
            - name: deploy-token
    asserts:
      - equal:
          path: secrets[0].name
          value: deploy-token
