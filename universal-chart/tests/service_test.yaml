suite: service
templates:
  - svc.yaml
tests:
  - it: renders a Service with correct kind
    set:
      services.web.ports[0].port: 80
      services.web.ports[0].targetPort: 80
    asserts:
      - isKind:
          of: Service
      - equal:
          path: apiVersion
          value: v1
      - matchRegex:
          path: metadata.name
          pattern: -web$

  - it: respects the disabled flag
    set:
      services.web.disabled: true
      services.web.ports[0].port: 80
    asserts:
      - hasDocuments:
          count: 0

  - it: merges defaults.annotations into service metadata
    set:
      defaults:
        annotations:
          team: platform
      services.web.ports[0].port: 80
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: merges defaults.annotations with instance annotations
    set:
      defaults:
        annotations:
          team: platform
      services.web.annotations:
        custom: value
      services.web.ports[0].port: 80
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.custom
          value: value

  - it: ExternalName service renders externalName and omits selector
    set:
      services:
        extdb:
          type: ExternalName
          externalName: db.example.com
          ports:
            - name: pg
              port: 5432
    asserts:
      - equal:
          path: spec.type
          value: ExternalName
      - equal:
          path: spec.externalName
          value: db.example.com
      - notExists:
          path: spec.selector

  - it: ClusterIP service renders selector and omits externalName
    set:
      services:
        web:
          ports:
            - name: http
              port: 80
    asserts:
      - isNotEmpty:
          path: spec.selector
      - notExists:
          path: spec.externalName

  - it: service with workload field uses component selector
    set:
      services.api-svc.ports[0].port: 80
      services.api-svc.ports[0].name: http
      services.api-svc.workload: api
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: api

  - it: service without workload field uses base selector
    set:
      services.basic.ports[0].port: 80
      services.basic.ports[0].name: http
    asserts:
      - notExists:
          path: spec.selector["app.kubernetes.io/component"]
      - exists:
          path: spec.selector["app.kubernetes.io/name"]
