suite: pvc auto-mount in statefulsets
templates:
  - statefulset.yaml
tests:
  - it: adds PVC volume and volumeMount when mountPath is set
    values:
      - values/pvc_automount.yaml
    set:
      deployments: {}
      statefulSets:
        web:
          image: nginx
          imageTag: "1.25"
          ports:
            http: 8080
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: app-data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-app-data
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: app-data
            mountPath: /data

  - it: skips disabled PVCs
    values:
      - values/pvc_automount_disabled.yaml
    set:
      deployments: {}
      statefulSets:
        web:
          image: nginx
          imageTag: "1.25"
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: app-data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-app-data
