suite: clustersecretstore template
templates:
  - clustersecretstores.yaml
tests:
  - it: renders a clustersecretstore with api version name and no namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterSecretStores.global-store.spec.provider.azurekv.vaultUrl: "https://my-vault.vault.azure.net"
      clusterSecretStores.global-store.spec.provider.azurekv.authType: WorkloadIdentity
    asserts:
      - isKind:
          of: ClusterSecretStore
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -global-store$
      - notExists:
          path: metadata.namespace
  - it: passes clustersecretstore spec through
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterSecretStores.global-store.spec.provider.azurekv.vaultUrl: "https://my-vault.vault.azure.net"
      clusterSecretStores.global-store.spec.provider.azurekv.authType: WorkloadIdentity
    asserts:
      - equal:
          path: spec.provider.azurekv.authType
          value: WorkloadIdentity
