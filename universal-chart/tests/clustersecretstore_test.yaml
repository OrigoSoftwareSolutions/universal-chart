suite: clustersecretstore template
templates:
  - clustersecretstores.yaml
tests:
  - it: renders a clustersecretstore with api version name and no namespace
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterSecretStores.global-store.spec.provider.aws.service: SecretsManager
      clusterSecretStores.global-store.spec.provider.aws.region: eu-west-1
    asserts:
      - isKind:
          of: ClusterSecretStore
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - matchRegex:
          path: metadata.name
          pattern: -global-store$
      - notExists:
          path: metadata.namespace
  - it: omits clustersecretstore documents when disabled
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterSecretStores.global-store.disabled: true
    asserts:
      - hasDocuments:
          count: 0
  - it: passes clustersecretstore spec through
    capabilities:
      apiVersions:
        - external-secrets.io/v1
    set:
      clusterSecretStores.global-store.spec.provider.aws.service: SecretsManager
      clusterSecretStores.global-store.spec.provider.aws.region: eu-west-1
    asserts:
      - equal:
          path: spec.provider.aws.region
          value: eu-west-1
