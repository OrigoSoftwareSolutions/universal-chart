suite: servicemonitor
templates:
  - servicemonitor.yaml
tests:
  - it: renders a ServiceMonitor with correct kind and apiVersion
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.endpoints[0].interval: 30s
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1
      - matchRegex:
          path: metadata.name
          pattern: -app$
      - isNotEmpty:
          path: metadata.namespace

  - it: renders only one document per entry
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.endpoints[0].interval: 30s
    asserts:
      - hasDocuments:
          count: 1

  - it: respects the disabled flag
    set:
      serviceMonitors.app.disabled: true
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - hasDocuments:
          count: 0

  - it: honors explicit selector.matchLabels when provided
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.selector.matchLabels.app: custom-app
    asserts:
      - equal:
          path: spec.selector.matchLabels.app
          value: custom-app
      - notExists:
          path: spec.selector.matchLabels.app.kubernetes.io/name

  - it: merges defaults.annotations into metadata
    set:
      defaults:
        annotations:
          team: platform
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: merges defaults.annotations with instance annotations
    set:
      defaults:
        annotations:
          team: platform
      serviceMonitors.app.annotations:
        custom: value
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.custom
          value: value
