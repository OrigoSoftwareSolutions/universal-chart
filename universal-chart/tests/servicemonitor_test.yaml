suite: servicemonitor
templates:
  - servicemonitor.yaml
tests:
  - it: renders a ServiceMonitor with correct kind and apiVersion
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.endpoints[0].interval: 30s
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: apiVersion
          value: monitoring.coreos.com/v1
      - matchRegex:
          path: metadata.name
          pattern: -app$
      - isNotEmpty:
          path: metadata.namespace

  - it: renders only one document per entry
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.endpoints[0].interval: 30s
    asserts:
      - hasDocuments:
          count: 1

  - it: honors explicit selector.matchLabels when provided
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.selector.matchLabels.app: custom-app
    asserts:
      - equal:
          path: spec.selector.matchLabels.app
          value: custom-app
      - notExists:
          path: spec.selector.matchLabels.app.kubernetes.io/name

  - it: merges defaults.annotations into metadata
    set:
      defaults:
        annotations:
          team: platform
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform

  - it: merges defaults.annotations with instance annotations
    set:
      defaults:
        annotations:
          team: platform
      serviceMonitors.app.annotations:
        custom: value
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform
      - equal:
          path: metadata.annotations.custom
          value: value

  - it: renders jobLabel when set
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.jobLabel: my-app
    asserts:
      - equal:
          path: spec.jobLabel
          value: my-app

  - it: omits jobLabel when not set
    set:
      serviceMonitors.app.endpoints[0].port: http
    asserts:
      - notExists:
          path: spec.jobLabel

  - it: renders targetLabels when set
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.targetLabels:
        - app
        - version
    asserts:
      - equal:
          path: spec.targetLabels
          value:
            - app
            - version

  - it: renders podTargetLabels when set
    set:
      serviceMonitors.app.endpoints[0].port: http
      serviceMonitors.app.podTargetLabels:
        - pod-label-a
    asserts:
      - equal:
          path: spec.podTargetLabels
          value:
            - pod-label-a

  - it: default selector scopes to one workload via app.kubernetes.io/component
    set:
      serviceMonitors.api.endpoints[0].port: http
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: api
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
      - exists:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]

  - it: workload field overrides the default component selector
    set:
      serviceMonitors.api-metrics.endpoints[0].port: http
      serviceMonitors.api-metrics.workload: api
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: api

  - it: extraSelectorLabels are merged into the default workload selector
    set:
      serviceMonitors.api.endpoints[0].port: http
      serviceMonitors.api.extraSelectorLabels:
        scrape-tier: gold
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: api
      - equal:
          path: spec.selector.matchLabels.scrape-tier
          value: gold
