suite: pvc
templates:
  - pvc.yaml
tests:
  - it: renders a PVC with correct kind and apiVersion
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: apiVersion
          value: v1
      - matchRegex:
          path: metadata.name
          pattern: -data$
      - isNotEmpty:
          path: metadata.namespace
      - isNotEmpty:
          path: metadata.labels

  - it: defaults size to 1Gi
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: uses custom size
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          size: 50Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: sets accessModes
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteMany
    asserts:
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteMany

  - it: sets storageClassName
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          storageClassName: gp3
    asserts:
      - equal:
          path: spec.storageClassName
          value: gp3

  - it: sets volumeMode
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          volumeMode: Block
    asserts:
      - equal:
          path: spec.volumeMode
          value: Block

  - it: sets volumeName for pre-provisioned PV
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          volumeName: pv-existing
    asserts:
      - equal:
          path: spec.volumeName
          value: pv-existing

  - it: renders labels and annotations
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          labels:
            team: platform
          annotations:
            note: important
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            team: platform
      - isSubset:
          path: metadata.annotations
          content:
            note: important

  - it: adds keep annotation when keepOnDelete is true
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
          keepOnDelete: true
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: does not add keep annotation when keepOnDelete is false
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
    asserts:
      - notExists:
          path: metadata.annotations["helm.sh/resource-policy"]

  - it: renders multiple PVCs
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
        logs:
          accessModes:
            - ReadWriteOnce
          size: 10Gi
    asserts:
      - hasDocuments:
          count: 2

  - it: renders no documents when pvcs is empty
    set:
      pvcs: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: skips rendering when disabled is true
    set:
      pvcs:
        data:
          disabled: true
          accessModes:
            - ReadWriteOnce
    asserts:
      - hasDocuments:
          count: 0

  - it: skips only disabled PVC among multiple
    set:
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
        logs:
          disabled: true
          accessModes:
            - ReadWriteOnce
    asserts:
      - hasDocuments:
          count: 1

  - it: merges defaults.annotations into PVC metadata
    set:
      defaults:
        annotations:
          team: platform
      pvcs:
        data:
          accessModes:
            - ReadWriteOnce
    asserts:
      - equal:
          path: metadata.annotations.team
          value: platform
---
suite: pvc workload scoping
templates:
  - deployment.yaml
tests:
  - it: injects a scoped PVC into deployment named web
    set:
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: web
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data

  - it: does not inject a scoped PVC into deployment named api
    set:
      deployments.api.image: nginx
      deployments.api.imageTag: "1.25"
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads[0]: web
    asserts:
      - equal:
          path: spec.template.spec.volumes
          value: []
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []

  - it: injects an unscoped PVC into all deployments
    set:
      deployments.api.image: nginx
      deployments.api.imageTag: "1.25"
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.mountPath: /data
    asserts:
      - hasDocuments:
          count: 2
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data
        documentIndex: 0
      - contains:
          path: spec.template.spec.volumes
          content:
            name: shared
            persistentVolumeClaim:
              claimName: RELEASE-NAME-shared
        documentIndex: 1
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: shared
            mountPath: /data
        documentIndex: 1

  - it: does not inject a PVC into any deployment when workloads is empty
    set:
      deployments.api.image: nginx
      deployments.api.imageTag: "1.25"
      deployments.web.image: nginx
      deployments.web.imageTag: "1.25"
      pvcs.shared.accessModes[0]: ReadWriteOnce
      pvcs.shared.mountPath: /data
      pvcs.shared.workloads: []
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: spec.template.spec.volumes
          value: []
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []
        documentIndex: 0
      - equal:
          path: spec.template.spec.volumes
          value: []
        documentIndex: 1
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value: []
        documentIndex: 1
