# Smoke test: one deployment, one service, plus all supported dict-based resources.
# Uses the current singular-block API. Each singular workload key may appear at most once.
deployment:
  image: nginx
  imageTag: "1.25"

service:
  ports:
    - port: 80
      targetPort: 80

hpa:
  scaleTargetRef:
    kind: Deployment
    name: test
  minReplicas: 2
  maxReplicas: 5
  targetCPU: 70

pdb:
  minAvailable: 1

pvc:
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  storageClassName: standard

externalSecrets:
  docker-registry:
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: azure-secrets
        kind: SecretStore
      target:
        name: docker-pull-secret
        template:
          type: kubernetes.io/dockerconfigjson
      data:
        - secretKey: .dockerconfigjson
          remoteRef:
            key: prod/myapp/docker-config
  api-keys:
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: azure-secrets
        kind: SecretStore
      target:
        name: api-keys
      data:
        - secretKey: token
          remoteRef:
            key: prod/myapp/api-token

secretStores:
  azure-store:
    spec:
      provider:
        azurekv:
          vaultUrl: "https://my-vault.vault.azure.net"
          authType: WorkloadIdentity
          serviceAccountRef:
            name: eso-sa

clusterSecretStores:
  cluster-store:
    spec:
      provider:
        kubernetes:
          remoteNamespace: default
          server:
            caProvider:
              type: ConfigMap
              name: kube-root-ca.crt
              key: ca.crt
          auth:
            serviceAccount:
              name: cluster-store-sa

clusterExternalSecrets:
  shared-config:
    spec:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
      refreshTime: 1h
      externalSecretSpec:
        refreshInterval: 1h
        secretStoreRef:
          name: cluster-store
          kind: ClusterSecretStore
        target:
          name: shared-config
        data: []

clusterIssuers:
  letsencrypt-prod:
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: devops@origo.is
        privateKeySecretRef:
          name: letsencrypt-prod
        solvers:
          - dns01:
              azureDNS:
                subscriptionID: fake-sub-id
                resourceGroupName: fake-rg
                hostedZoneName: origo.is

httpRoutes:
  web:
    spec:
      parentRefs:
        - name: istio-gateway
          namespace: istio-ingress
      hostnames:
        - app.origo.is
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: web
              port: 80

istioPeerAuthentications:
  default:
    spec:
      mtls:
        mode: STRICT

istioAuthorizationPolicies:
  deny-all:
    spec:
      action: DENY
      rules:
        - {}

configMaps:
  app-config:
    data:
      APP_ENV: production
      LOG_LEVEL: info

certificates:
  app-tls:
    dnsNames:
      - app.origo.is
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer
      group: cert-manager.io

issuers:
  self-signed:
    selfSigned: {}

serviceMonitors:
  web:
    endpoints:
      - port: http
        interval: 30s
        path: /metrics

istioVirtualServices:
  web:
    hosts:
      - app.origo.is
    gateways:
      - istio-ingress/istio-gateway
    http:
      - name: default
        route:
          - destination:
              host: web
              port:
                number: 80

istioDestinationRules:
  web:
    host: web.default.svc.cluster.local
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 100

istioGateways:
  main:
    selector:
      istio: ingressgateway
    servers:
      - hosts:
          - app.origo.is
        port:
          name: https
          number: 443
          protocol: HTTPS

persistentVolumes:
  shared-data:
    spec:
      capacity:
        storage: 10Gi
      accessModes:
        - ReadWriteMany
      hostPath:
        path: /mnt/data
      persistentVolumeReclaimPolicy: Retain

secrets:
  app-secret:
    data:
      API_KEY: c2VjcmV0
