# Smoke test: one deployment, one service
deployments:
  web:
    containers:
      - name: web
        image: nginx
        imageTag: "1.25"

services:
  web:
    ports:
      - port: 80
        targetPort: 80

externalSecrets:
  my-db-secret:
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: azure-secrets
        kind: SecretStore
      target:
        name: my-db-secret
      data:
        - secretKey: password
          remoteRef:
            key: prod/myapp/db
            property: password

secretStores:
  azure-store:
    spec:
      provider:
        azurekv:
          vaultUrl: "https://my-vault.vault.azure.net"
          authType: WorkloadIdentity
          serviceAccountRef:
            name: eso-sa

clusterSecretStores:
  cluster-store:
    spec:
      provider:
        kubernetes:
          remoteNamespace: default
          server:
            caProvider:
              type: ConfigMap
              name: kube-root-ca.crt
              key: ca.crt
          auth:
            serviceAccount:
              name: cluster-store-sa

clusterExternalSecrets:
  shared-config:
    spec:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: default
      refreshTime: 1h
      externalSecretSpec:
        refreshInterval: 1h
        secretStoreRef:
          name: cluster-store
          kind: ClusterSecretStore
        target:
          name: shared-config
        data: []

clusterIssuers:
  letsencrypt-prod:
    spec:
      acme:
        server: https://acme-v02.api.letsencrypt.org/directory
        email: devops@origo.is
        privateKeySecretRef:
          name: letsencrypt-prod
        solvers:
          - dns01:
              azureDNS:
                subscriptionID: fake-sub-id
                resourceGroupName: fake-rg
                hostedZoneName: origo.is

httpRoutes:
  web:
    spec:
      parentRefs:
        - name: istio-gateway
          namespace: istio-ingress
      hostnames:
        - app.origo.is
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
          backendRefs:
            - name: web
              port: 80

istioPeerAuthentications:
  default:
    spec:
      mtls:
        mode: STRICT

istioAuthorizationPolicies:
  deny-all:
    spec:
      action: DENY
      rules:
        - {}

# --- StatefulSet ---
statefulSets:
  cache:
    serviceName: cache
    containers:
      - name: cache
        image: redis
        imageTag: "7"


# --- DaemonSet ---
daemonSets:
  log-collector:
    containers:
      - name: fluent
        image: fluent/fluentd
        imageTag: "latest"
# --- CronJob ---
cronJobs:
  cleanup:
    schedule: "0 3 * * *"
    containers:
      - name: cleanup
        image: busybox
        imageTag: "latest"
        command: ["/bin/sh", "-c", "echo cleanup"]

# --- Job ---
jobs:
  migrate:
    containers:
      - name: migrate
        image: busybox
        imageTag: "latest"
        command: ["/bin/sh", "-c", "echo migrate"]

# --- ConfigMap ---
configMaps:
  app-config:
    data:
      APP_ENV: production
      LOG_LEVEL: info

# --- HPA ---
hpas:
  web:
    scaleTargetRef:
      kind: Deployment
      name: web
    minReplicas: 2
    maxReplicas: 5
    targetCPU: 70

# --- Certificate (requires cert-manager.io/v1) ---
certificates:
  app-tls:
    dnsNames:
      - app.origo.is
    issuerRef:
      name: letsencrypt-prod
      kind: ClusterIssuer
      group: cert-manager.io

# --- Issuer (requires cert-manager.io/v1) ---
issuers:
  self-signed:
    selfSigned: {}

# --- ServiceMonitor ---
serviceMonitors:
  web:
    endpoints:
      - port: http
        interval: 30s
        path: /metrics

# --- IstioVirtualService ---
istioVirtualServices:
  web:
    hosts:
      - app.origo.is
    gateways:
      - istio-ingress/istio-gateway
    http:
      - name: default
        route:
          - destination:
              host: web
              port:
                number: 80

# --- IstioDestinationRule ---
istioDestinationRules:
  web:
    host: web.default.svc.cluster.local
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 100

# --- IstioGateway ---
istioGateways:
  main:
    selector:
      istio: ingressgateway
    servers:
      - hosts:
          - app.origo.is
        port:
          name: https
          number: 443
          protocol: HTTPS


# --- PodDisruptionBudget ---
pdbs:
  web:
    minAvailable: 1

# --- PersistentVolume ---
persistentVolumes:
  shared-data:
    spec:
      capacity:
        storage: 10Gi
      accessModes:
        - ReadWriteMany
      hostPath:
        path: /mnt/data
      persistentVolumeReclaimPolicy: Retain

# --- PersistentVolumeClaim ---
pvcs:
  data:
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: standard

# --- Secret ---
secrets:
  app-secret:
    data:
      API_KEY: c2VjcmV0
