
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myprefix-api
  namespace: NAMESPACE
  labels:
    app.kubernetes.io/name: RELEASE-NAME
    app.kubernetes.io/instance: RELEASE-NAME
    helm.sh/chart: universal-chart-1.1.8
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app.kubernetes.io/name: RELEASE-NAME
      app.kubernetes.io/instance: RELEASE-NAME
  template:
    metadata:
      labels:
        app.kubernetes.io/name: RELEASE-NAME
        app.kubernetes.io/instance: RELEASE-NAME
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: RELEASE-NAME
                  app.kubernetes.io/instance: RELEASE-NAME
              namespaces:
              - "NAMESPACE"
              topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: RELEASE-NAME
                  app.kubernetes.io/instance: RELEASE-NAME
              namespaces:
              - "NAMESPACE"
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: api
        image: myapp:1.0
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts: []
      volumes: []
