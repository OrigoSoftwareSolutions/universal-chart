name: Release

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Skip-existing pattern: a release happens iff Chart.yaml's version is new.
      # GHCR OCI tags are immutable, so any duplicate-version push would fail anyway —
      # this turns the no-op case into a clean exit instead of a red workflow.
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(awk '/^version:/ {print $2}' universal-chart/Chart.yaml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if helm show chart oci://ghcr.io/origosoftwaresolutions/universal-chart --version "${VERSION}" >/dev/null 2>&1; then
            echo "universal-chart ${VERSION} already published — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package chart
        if: steps.check.outputs.skip == 'false'
        run: helm package universal-chart/

      - name: Push to GHCR
        if: steps.check.outputs.skip == 'false'
        run: helm push universal-chart-${{ steps.check.outputs.version }}.tgz oci://ghcr.io/origosoftwaresolutions
