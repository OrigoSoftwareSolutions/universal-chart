name: Release

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: write    # required for `gh release create` (tag + GitHub Release)

# Queue release runs serially. Cancelling mid-`helm push` would leave GHCR
# populated without a matching GitHub Release — keep the workflow atomic per release.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Skip-existing pattern: a release happens iff Chart.yaml's version is new.
      # GHCR OCI tags are immutable, so any duplicate-version push would fail anyway —
      # this turns the no-op case into a clean exit instead of a red workflow.
      - name: Check if version already published
        id: check
        run: |
          VERSION=$(awk '/^version:/ {print $2}' universal-chart/Chart.yaml)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if helm show chart oci://ghcr.io/origosoftwaresolutions/universal-chart --version "${VERSION}" >/dev/null 2>&1; then
            echo "universal-chart ${VERSION} already published — skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package chart
        if: steps.check.outputs.skip == 'false'
        run: helm package universal-chart/

      # Monotonicity gate: refuse to release if Chart.yaml.version is not strictly
      # greater than the highest stable tag already in GHCR. Catches typos and
      # stale-branch merges that would otherwise publish a ghost lower-version tag.
      # No support for backport release lines — when needed, drop this step for one merge.
      - name: Reject downgrade
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          LATEST=$(gh api --paginate \
            /orgs/origosoftwaresolutions/packages/container/universal-chart/versions \
            --jq '.[].metadata.container.tags[]?' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No prior stable releases — accepting ${VERSION} as initial release."
            exit 0
          fi
          if [ "$(printf '%s\n%s\n' "$LATEST" "$VERSION" | sort -V | tail -1)" != "$VERSION" ]; then
            echo "Refusing release: ${VERSION} is not strictly greater than published max ${LATEST}."
            echo "Bump Chart.yaml to a version > ${LATEST} and re-merge."
            exit 1
          fi
          echo "OK: ${VERSION} > ${LATEST}"

      - name: Push to GHCR
        if: steps.check.outputs.skip == 'false'
        run: helm push universal-chart-${{ steps.check.outputs.version }}.tgz oci://ghcr.io/origosoftwaresolutions

      # GitHub Release with autogenerated notes from PR titles since the previous tag.
      # `gh release create` creates the v<version> git tag itself — never push tags by hand.
      # First run after this step is introduced has no previous tag, so its notes are minimal;
      # subsequent runs render the diff cleanly. Bootstrap by tagging the current Chart.yaml
      # version once (see AGENTS.md "Release") so the next release has a comparison baseline.
      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          # Idempotency: a re-run after a partial failure (e.g. flaky GHCR push)
          # would otherwise 422 here. Skip if the Release already exists.
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "GitHub Release v${VERSION} already exists — skipping."
            exit 0
          fi
          # `--latest` is intentionally omitted: GitHub auto-detects "Latest" by
          # semver+date, which correctly handles backport releases (where the
          # reject-downgrade gate is dropped for one merge). Forcing --latest
          # would wrongly flag a backport as the newest release.
          gh release create "v${VERSION}" \
            "universal-chart-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --generate-notes
