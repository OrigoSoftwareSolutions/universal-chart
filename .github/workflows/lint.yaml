name: Lint Chart

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint
        run: helm lint . --strict

      - name: Template smoke test
        run: helm template test . -f ci/test-values.yaml > /dev/null
