name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Lint
        run: helm lint universal-chart/ --strict

      - name: Install kubeconform
        run: |
          curl -sLO https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Schema validation
        run: |
          helm template test universal-chart/ -f universal-chart/ci/test-values.yaml \
            | kubeconform \
              -strict \
              -ignore-missing-schemas \
              -kubernetes-version 1.33.6 \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Install helm-unittest plugin
        # --verify=false required on Helm 4: GPG verification of git plugin
        # sources is not supported. See helm-unittest README and issue #785.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 1.1.0 --verify=false

      - name: Run unit tests
        run: helm unittest universal-chart/ --strict --file 'tests/*.yaml'

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install helm-docs
        run: |
          curl -sLO https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz
          tar -xzf helm-docs_1.14.2_Linux_x86_64.tar.gz helm-docs
          sudo mv helm-docs /usr/local/bin/

      - name: Check docs are up to date
        run: |
          helm-docs --chart-search-root universal-chart/ -o ../README.md
          git diff --exit-code README.md \
            || (echo "ERROR: README.md is out of date. Run 'helm-docs --chart-search-root universal-chart/ -o ../README.md' locally and commit." && exit 1)
