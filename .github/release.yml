# Configures categorization in autogenerated release notes (--generate-notes).
# Dependabot auto-labels its PRs `dependencies` (and `github_actions` for workflow
# bumps), so they land in the Dependencies bucket. Everything else falls through
# the wildcard into Changes. Order matters — more-specific categories first.
changelog:
  categories:
    - title: Dependencies
      labels:
        - dependencies
    - title: Changes
      labels:
        - "*"
